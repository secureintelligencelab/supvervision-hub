<!DOCTYPE html>

<title>MRes Supervision Hub</title>
<style>
  /* ============================================================
     DESIGN TOKENS
     Palette: "Field notebook" — ink, paper, supervisory teal,
     approval amber, alert clay. Ruled-paper structure, ink-on-cream.
     ============================================================ */
  :root{
    --ink:#14181c;
    --ink-soft:#39424a;
    --paper:#f6f3ec;
    --paper-2:#fffdf8;
    --line:#d4cdbe;
    --line-strong:#b0a896;
    --teal:#1a5f5b;
    --teal-deep:#0e423f;
    --amber:#b97c0c;
    --amber-soft:#f3e3bf;
    --clay:#a8401f;
    --clay-soft:#f1d9d2;
    --green:#367044;
    --green-soft:#d2e6d3;
    --blue:#33548a;
    --blue-soft:#d6e1f1;

  button{cursor:pointer;font-size:15px}
  input,select,textarea{
    font-size:15.5px;padding:10px 12px;border:1px solid var(--line-strong);
    border-radius:8px;background:var(--paper-2);color:var(--ink);width:100%;
  }
  textarea{resize:vertical;min-height:62px;line-height:1.45}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
  label{font-size:13.5px;font-weight:700;color:var(--ink-soft);display:block;margin:0 0 5px;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-transform:uppercase;letter-spacing:.04em}
  .btn{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--teal-deep);

  .btn:hover{filter:brightness(1.07)}
  .btn:active{filter:brightness(.95)}
  .btn.ghost{background:transparent;color:var(--teal-deep);border-color:var(--line-strong)}
  .btn.ghost:hover{background:#0000000a;filter:none}
  .btn.danger{background:var(--clay);border-color:#7e3017}
  .btn.amber{background:var(--amber);border-color:#8a5b0a}
  .btn.blue{background:var(--blue);border-color:#264068;color:#fff}
  .btn.sm{padding:6px 12px;font-size:13.5px;border-radius:6px}
  .btn.xs{padding:4px 10px;font-size:12.5px;border-radius:6px}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:12px}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}

  .stat .n{font-size:30px;font-weight:700;font-family:ui-sans-serif,sans-serif;color:var(--ink)}

  .seg3 button{border:none;background:var(--paper-2);padding:7px 13px;font-size:13.5px;font-weight:600;

  .seg3 button:last-child{border-right:none}

/* ============================================================
   2. DATA LAYER
   Firestore structure:
     users/{uid}      -> {email,name,role:'admin'|'supervisor',
                          supRole:'both'|'principal'|'co'}
     semesters/{id}   -> {label, weeks, units:[{id,code,name}, ...]}
     students/{id}    -> {semesterId, sid, name, email, campus, unitIds:[...],
                          principalUid, coUid, principalName, coName}
     timetables/{id}  -> {semesterId, unitId, supervisorUid, day, start, end,
                          room, status:'pending'|'approved'}   // class still admin-approved
     consultations/{id} -> {                                   // ONE per student per principal
                          semesterId, studentDocId, supervisorUid (principal),
                          coUid, coName, principalName,
                          day, start, end, mode, meetingLink,   // recurring default (no approval)
                          weeks:{                               // per-week LOG
                            <w>:{ day?,start?,end?,mode?,link?, // optional overrides
                                  held:bool, studentAttended:bool|null,
                                  coAttended:'yes'|'no'|'na'|null,
                                  comment:string }
                          }
                        }
     (attendance collection retained for back-compat reads only; new logging
      lives inside consultations.weeks so meetings + attendance are one record.)

   Consultation times need NO admin approval — supervisors set & change them
   week to week. Class timetables still go through admin approval for Moodle.
   ============================================================ */

const mem = { users:{}, semesters:{}, students:{}, timetables:{}, consultations:{}, attendance:{}, costLogs:{} };
let memSeed = false;
function seedDemo(){
  if(memSeed) return; memSeed=true;
  mem.users["admin1"]={email:"admin@uni.edu",name:"Admin Office",role:"admin"};
  mem.users["supA"]={email:"a.smith@uni.edu",name:"Dr Smith",role:"supervisor",supRole:"both"};
  mem.users["supB"]={email:"b.jones@uni.edu",name:"Dr Jones",role:"supervisor",supRole:"principal"};
  mem.users["supC"]={email:"c.patel@uni.edu",name:"Dr Patel",role:"supervisor",supRole:"co"};
  mem.semesters["s2-2026"]={label:"S2 2026",weeks:12,units:[
    {id:"u1",code:"RES915",name:"Literature, Methodology & Proposal"},
    {id:"u2",code:"RES920",name:"Research Project"}
  ]};
  mem.semesters["y2-s1"]={label:"Year 2 — Semester 1",weeks:12,units:[
    {id:"u3",code:"RES930",name:"Thesis"}
  ]};
  const mk=(id,o)=>mem.students[id]=o;
  mk("st1",{semesterId:"s2-2026",sid:"45001",name:"Aisha Khan",email:"aisha@stu.edu",campus:"NSW",unitIds:["u1","u2"],principalUid:"supA",coUid:"supC",principalName:"Dr Smith",coName:"Dr Patel"});
  mk("st2",{semesterId:"s2-2026",sid:"45002",name:"Tom Reilly",email:"tom@stu.edu",campus:"NSW",unitIds:["u1"],principalUid:"supA",coUid:"",principalName:"Dr Smith",coName:""});
  mk("st3",{semesterId:"s2-2026",sid:"45003",name:"Mei Lin",email:"mei@stu.edu",campus:"ACT",unitIds:["u2"],principalUid:"supB",coUid:"supC",principalName:"Dr Jones",coName:"Dr Patel"});
  mem.timetables["tt1"]={semesterId:"s2-2026",unitId:"u1",supervisorUid:"supA",day:"Tuesday",start:"10:00",end:"13:00",room:"NSW Rm 4.12",status:"approved"};
  // sample consultation with a couple of weeks logged
  mem.consultations["c1"]={semesterId:"s2-2026",studentDocId:"st1",supervisorUid:"supA",
    coUid:"supC",coName:"Dr Patel",principalName:"Dr Smith",
    day:"Wednesday",start:"14:00",end:"14:30",mode:"Online",
    meetingLink:"https://teams.microsoft.com/l/meetup/aisha-weekly",
    weeks:{
      1:{held:true,studentAttended:true,coAttended:"yes",comment:"Discussed proposal scope."},
      2:{held:true,studentAttended:false,coAttended:"na",comment:"Student unwell, rescheduled offline."},
      3:{held:true,studentAttended:true,coAttended:"no",comment:""}
    }};
  // sample co-supervisor log entries (ad-hoc, not weekly)
  mem.costLogs["cl1"]={semesterId:"s2-2026",studentDocId:"st1",studentName:"Aisha Khan",
    coUid:"supC",coName:"Dr Patel",createdByUid:"supA",createdByName:"Dr Smith",
    date:"2026-03-04",title:"Methodology review",coAttended:"yes",
    note:"Dr Patel reviewed the sampling strategy and suggested adding a pilot study."};
  mem.costLogs["cl2"]={semesterId:"s2-2026",studentDocId:"st1",studentName:"Aisha Khan",
    coUid:"supC",coName:"Dr Patel",createdByUid:"supA",createdByName:"Dr Smith",
    date:"2026-04-15",title:"Draft chapter feedback",coAttended:"no",
    note:"Dr Patel unavailable; feedback to be provided by email instead."};
}

const DB = {
  async getUser(uid){
    if(DEMO){ return mem.users[uid]||null; }
    const s = await getDoc(doc(db,"users",uid)); return s.exists()?s.data():null;
  },
  async setUser(uid,data){ if(DEMO){mem.users[uid]={...mem.users[uid],...data};return;} await setDoc(doc(db,"users",uid),data,{merge:true}); },
  async updateUser(uid,data){ if(DEMO){mem.users[uid]={...mem.users[uid],...data};return;} await updateDoc(doc(db,"users",uid),data); },
  async removeUser(uid){ if(DEMO){ delete mem.users[uid]; return; } await deleteDoc(doc(db,"users",uid)); },
  async findUserByEmail(email){
    if(DEMO){ const e=Object.entries(mem.users).find(([k,v])=>v.email===email); return e?{uid:e[0],...e[1]}:null; }
    const q=query(collection(db,"users"),where("email","==",email)); const r=await getDocs(q);
    return r.empty?null:{uid:r.docs[0].id,...r.docs[0].data()};
  },
  async listUsers(){
    if(DEMO){ return Object.entries(mem.users).map(([id,v])=>({id,...v})); }
    const r=await getDocs(collection(db,"users")); return r.docs.map(d=>({id:d.id,...d.data()}));
  },
  async list(coll, filters={}){
    if(DEMO){
      return Object.entries(mem[coll]||{}).map(([id,v])=>({id,...v}))
        .filter(o=>Object.entries(filters).every(([k,val])=>o[k]===val));
    }
    let qref=collection(db,coll); const fs=Object.entries(filters);
    if(fs.length){ qref=query(qref,...fs.map(([k,v])=>where(k,"==",v))); }
    const r=await getDocs(qref); return r.docs.map(d=>({id:d.id,...d.data()}));
  },
  async get(coll,id){
    if(DEMO){ return mem[coll][id]?{id,...mem[coll][id]}:null; }
    const s=await getDoc(doc(db,coll,id)); return s.exists()?{id,...s.data()}:null;
  },
  async add(coll,data){
    if(DEMO){ const id="x"+Math.random().toString(36).slice(2,9); mem[coll][id]={...data}; return id; }
    const r=await addDoc(collection(db,coll),data); return r.id;
  },
  async set(coll,id,data){
    if(DEMO){ mem[coll][id]={...mem[coll][id],...data}; return; }
    await setDoc(doc(db,coll,id),data,{merge:true});
  },
  async update(coll,id,data){
    if(DEMO){ mem[coll][id]={...mem[coll][id],...data}; return; }
    await updateDoc(doc(db,coll,id),data);
  },
  // Update ONE week inside a consultation's `weeks` map using Firestore's
  // nested field-path syntax. This rewrites only that single key (never the
  // whole map), which avoids stale-merge / cache issues that made per-week
  // time changes appear not to save. weekData fully replaces that week.
  async updateWeek(consId, weekKey, weekData){
    const key=String(weekKey);
    if(DEMO){
      const c=mem.consultations[consId]||{};
      const weeks={...(c.weeks||{})};
      weeks[key]=weekData;
      mem.consultations[consId]={...c, weeks};
      return;
    }
    await updateDoc(doc(db,"consultations",consId), { ["weeks."+key]: weekData });
  },
  // Read a single consultation fresh from the server (bypasses list caching).
  async getConsultation(id){
    if(DEMO){ return mem.consultations[id]?{id,...mem.consultations[id]}:null; }
    const s=await getDoc(doc(db,"consultations",id));
    return s.exists()?{id,...s.data()}:null;
  },
  async remove(coll,id){ if(DEMO){ delete mem[coll][id]; return; } await deleteDoc(doc(db,coll,id)); }
};

/* ============================================================
   3. APP STATE & HELPERS
   ============================================================ */
const S = { user:null, role:null, uid:null, semesters:[], activeSem:null, tab:"students", supervisors:[] };

const $ = s=>document.querySelector(s);
const el = (tag,props={},...kids)=>{
  const n=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==="class")n.className=v; else if(k==="html")n.innerHTML=v;
    else if(k.startsWith("on"))n.addEventListener(k.slice(2),v);
    else n.setAttribute(k,v);
  }
  kids.flat().forEach(c=>n.append(c?.nodeType?c:document.createTextNode(c??"")));
  return n;
};
function toast(msg,isErr){ const t=$("#toast"); t.textContent=msg; t.className="show"+(isErr?" err":""); setTimeout(()=>t.className="",2600); }
const CAMPUSES=["NSW","ACT","Perth","VIC","QLD"];
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

function activeSemester(){ return S.semesters.find(s=>s.id===S.activeSem)||null; }
function semOf(id){ return S.semesters.find(s=>s.id===id)||null; }
function unitsOf(sem){ return Array.isArray(sem?.units)?sem.units:[]; }
function unitById(sem,unitId){ return unitsOf(sem).find(u=>u.id===unitId)||null; }
function unitOneLine(u){
  if(!u) return "Unit";
  const code=(u.code||"").trim(), name=(u.name||"").trim();
  if(code&&name) return code+" · "+name;
  return code||name||"Unit";
}
function semUnitCodes(sem){
  const codes=unitsOf(sem).map(u=>(u.code||"").trim()).filter(Boolean);
  return codes.length?codes.join(", "):"No units";
}
function uid(){ return "u"+Math.random().toString(36).slice(2,9); }

function capOf(u){ return u?.supRole||"both"; }
function canBePrincipal(u){ return capOf(u)!=="co"; }
function canBeCo(u){ return capOf(u)!=="principal"; }
function capLabel(c){ return c==="principal"?"Principal only":c==="co"?"Co-supervisor only":"Principal & co"; }
function supName(uid){ const u=S.supervisors.find(x=>x.id===uid); return u?.name||u?.email||uid||"—"; }

// ---- Consultation / weekly-log helpers ----
// The effective time for a given week = week override (if any) else the recurring default.
function weekTime(cons,w){
  const ov=(cons?.weeks?.[w]) || (cons?.weeks?.[String(w)]) || {};
  return {
    day:   ov.day   || cons.day,
    start: ov.start || cons.start,
    end:   ov.end   || cons.end,
    mode:  ov.mode  || cons.mode,
    link:  ov.link  || cons.meetingLink,
    overridden: !!(ov.day||ov.start||ov.end||ov.mode||ov.link)
  };
}
function weekLog(cons,w){ return (cons?.weeks?.[w]) || (cons?.weeks?.[String(w)]) || {}; }
// counts across a consultation's weeks
function consultStats(cons,totalWeeks){
  let held=0, attended=0, missed=0, logged=0;
  for(let w=1;w<=totalWeeks;w++){
    const l=weekLog(cons,w); if(!Object.keys(l).length) continue;
    if(l.held===true||l.held===false) logged++;
    if(l.held===true){ held++;
      if(l.studentAttended===true) attended++;
      else if(l.studentAttended===false) missed++;
    }
  }
  return {held,attended,missed,logged};
}

function authMsg(e){
  const c=e?.code||"";
  if(c.includes("invalid-cred")||c.includes("wrong-password")||c.includes("user-not-found")) return "Email or password is incorrect.";
  if(c.includes("too-many")) return "Too many attempts. Try again shortly.";
  return e?.message||"Sign-in failed.";
}
function toastNode(){ return el("div",{id:"toast"}); }

async function doLogin(email,password){
  if(DEMO){
    seedDemo();
    const u=await DB.findUserByEmail(email);
    if(!u) throw {code:"auth/user-not-found"};
    S.user={email}; S.uid=u.uid; S.role=u.role; S.userName=u.name;
    await afterLogin(); return;
  }
  await signInWithEmailAndPassword(auth,email,password);

async function afterLogin(){
  S.semesters=await DB.list("semesters");
  S.semesters.sort((a,b)=>(a.label>b.label?-1:1));
  // default to the semester that actually has students (fall back to first)
  let defaultSem=S.semesters[0]?.id||null;
  try{
    const counts={};
    const all=await DB.list("students");
    all.forEach(s=>{ counts[s.semesterId]=(counts[s.semesterId]||0)+1; });
    const best=S.semesters.filter(s=>counts[s.id]).sort((a,b)=>counts[b.id]-counts[a.id])[0];
    if(best) defaultSem=best.id;
  }catch(e){}
  S.activeSem=defaultSem;
  S.supervisors=(await DB.listUsers()).filter(u=>u.role==="supervisor");
  renderApp();
}

  v.append(head);

  const bar=el("div",{class:"toolbar"});
  bar.append(semesterPicker(()=>viewStudents(v)));
  const search=el("input",{placeholder:"Search name, ID, email…",style:"min-width:200px"});
  const campusFilter=el("select",{style:"width:auto"},el("option",{value:""},"All campuses"),
    ...[...new Set(students.map(s=>s.campus))].filter(Boolean).map(c=>el("option",{value:c},c)));

      (!cf||s.campus===cf) &&
      [s.name,s.sid,s.email].some(x=>(x||"").toLowerCase().includes(term)));

        el("strong",{class:"ui"},campus+" campus"),
        el("span",{class:"muted ui"},byCampus[campus].length+" student"+(byCampus[campus].length>1?"s":""))));

        ...["Student","ID","Units","Email","Principal","Co-supervisor",S.role==="admin"?"":null].filter(x=>x!==null).map(h=>el("th",{},h)))));
      const tb=el("tbody",{});
      byCampus[campus].forEach(s=>{
        const codes=(s.unitIds||[]).map(id=>unitById(sem,id)?.code).filter(Boolean);
        const cells=[
          el("td",{},el("strong",{},s.name)),
          el("td",{},s.sid),
          el("td",{},codes.length?codes.join(", "):el("span",{class:"muted"},"—")),
          el("td",{class:"muted"},s.email||"—"),
          el("td",{},s.principalName||"—"),

/* ---- CSV import ---- */
function importCSV(done){
  const input=el("input",{type:"file",accept:".csv"});
  const preview=el("div",{class:"muted",style:"margin-top:10px"});
  let rows=[];
  input.onchange=()=>{
    const file=input.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=()=>{
      rows=parseCSV(r.result);
      preview.innerHTML="";
      if(!rows.length){ preview.textContent="Could not read any rows."; return; }
      preview.append(el("strong",{},rows.length+" rows ready. "),
        "Expected columns: name, sid, email, campus, units, principal_email, co_email");
    };
    r.readAsText(file);
  };
  const sem=activeSemester();
  modal("Upload students from CSV",
    el("div",{},
      el("p",{class:"muted",style:"margin-top:0"},"First row must be a header. Supervisors are matched by email and must have the right capability. The optional \u201Cunits\u201D column lists unit codes separated by ; or | and must match this semester's units."),
      input, preview,
      el("details",{class:"help"},el("summary",{},"Show example CSV"),
        el("pre",{style:"background:#0000000d;padding:10px;border-radius:8px;overflow:auto;font-size:12px"},
          "name,sid,email,campus,units,principal_email,co_email\nAisha Khan,45001,aisha@stu.edu,NSW,RES915;RES920,a.smith@uni.edu,c.patel@uni.edu\nTom Reilly,45002,tom@stu.edu,NSW,RES915,a.smith@uni.edu,"))
    ),
    async()=>{
      if(!rows.length){ toast("Choose a CSV file first.",true); return false; }
      if(!S.activeSem){ toast("Create a semester first.",true); return false; }
      const units=unitsOf(sem);
      let ok=0;
      for(const row of rows){
        const pEmail=(row.principal_email||"").trim(), cEmail=(row.co_email||"").trim();
        let p=pEmail?S.supervisors.find(u=>u.email===pEmail):null;
        let c=cEmail?S.supervisors.find(u=>u.email===cEmail):null;
        if(p&&!canBePrincipal(p)) p=null;
        if(c&&!canBeCo(c)) c=null;
        if(!row.name||!row.sid) continue;
        const codes=(row.units||"").split(/[;|]/).map(x=>x.trim().toLowerCase()).filter(Boolean);
        const unitIds=units.filter(u=>codes.includes((u.code||"").toLowerCase())).map(u=>u.id);
        await DB.add("students",{
          semesterId:S.activeSem,sid:String(row.sid).trim(),name:row.name.trim(),
          email:(row.email||"").trim(),campus:(row.campus||"").trim()||"NSW",unitIds,
          principalUid:p?.id||"",coUid:c?.id||"",principalName:p?.name||p?.email||"",coName:c?.name||c?.email||""
        });
        ok++;
      }
      toast(`Imported ${ok} student${ok!==1?"s":""}.`); done(); return true;
    },"Import");
}
function parseCSV(text){
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim().length);
  if(lines.length<2) return [];
  const split=l=>{
    const out=[];let cur="",q=false;
    for(const ch of l){ if(ch==='"'){q=!q;} else if(ch===","&&!q){out.push(cur);cur="";} else cur+=ch; }
    out.push(cur); return out.map(s=>s.trim());
  };
  const headers=split(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,"_"));
  return lines.slice(1).map(l=>{ const c=split(l); const o={}; headers.forEach((h,i)=>o[h]=c[i]??""); return o; });
}

  let isPrincipalSomewhere=false;

    const myStudents=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
    isPrincipalSomewhere=myStudents.some(s=>s.principalUid===S.uid);

  let tts=await DB.list("timetables", S.activeSem?{semesterId:S.activeSem}:{});
  if(S.role==="supervisor") tts=tts.filter(t=>t.supervisorUid===S.uid);
  if(!tts.length){ v.append(emptyState("No class times set","A weekly class slot will appear here once set.")); return; }

  const card=el("div",{class:"card",style:"padding:0;overflow:hidden"});
  const t=el("table",{});

  const tb=el("tbody",{});
  tts.sort((a,b)=>DAYS.indexOf(a.day)-DAYS.indexOf(b.day));
  for(const tt of tts){
    const unit=unitById(sem,tt.unitId);
    const actions=el("div",{class:"row"});

      if(tt.status!=="approved") actions.append(el("button",{class:"btn sm",onclick:async()=>{await DB.update("timetables",tt.id,{status:"approved"});toast("Approved.");viewTimetables(v);}},"Approve"));
      else actions.append(el("button",{class:"btn ghost sm",onclick:async()=>{await DB.update("timetables",tt.id,{status:"pending"});viewTimetables(v);}},"Unapprove"));
      // admin may edit & delete any class time
      actions.append(el("button",{class:"btn ghost sm",onclick:()=>timetableForm(tt,()=>viewTimetables(v),true)},"Edit"),
        el("button",{class:"btn danger sm",onclick:()=>confirmDelete("timetables",tt.id,"this class time",()=>viewTimetables(v))},"Delete"));
    }
    tb.append(el("tr",{},
      el("td",{},el("strong",{},unit?.code||"—")),

      el("td",{},`${tt.start}–${tt.end}`),

  }
  t.append(tb); card.append(t); v.append(card);
}

/* ============================================================
   9. MEETING LOG TAB  (principal logs each week; admin views)
   Per student, per week: held? · student attended? · co attended?
   · optional time override · comment. Saved into consultations.weeks.
   ============================================================ */
async function viewMeetingLog(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Per-student weekly record · "+weeks+" weeks"),
    el("h2",{},"Supervision diary"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewMeetingLog(v)));
  v.append(bar);

  let students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  if(S.role==="supervisor") students=students.filter(s=>s.principalUid===S.uid);
  if(!students.length){
    v.append(emptyState("No students to log",
      S.role==="supervisor"?"You log meetings for students you principally supervise.":"Add students first."));
    return;
  }
  let cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});

  // pick student
  const sel=el("select",{style:"width:auto;min-width:220px"});
  students.forEach(s=>sel.append(el("option",{value:s.id},s.name+" · "+s.campus)));
  const picker=el("div",{class:"toolbar"},el("div",{class:"field"},el("label",{},"Student"),sel));
  v.append(picker);

  const panel=el("div",{});
  v.append(panel);

  function consFor(studentId){
    const s=students.find(x=>x.id===studentId);
    return cons.find(c=>c.studentDocId===studentId && c.supervisorUid===s.principalUid);
  }

  async function renderStudent(studentId){
    panel.innerHTML="";
    const s=students.find(x=>x.id===studentId);
    let c=consFor(studentId);

    // summary strip
    const stats = c ? consultStats(c,weeks) : {held:0,attended:0,missed:0,logged:0};
    const strip=el("div",{class:"stat"},
      statBox(String(stats.held),"Meetings held"),
      statBox(String(stats.attended),"Student attended"),
      statBox(String(stats.missed),"Student missed"),
      statBox(stats.held?Math.round(stats.attended/stats.held*100)+"%":"—","Attendance rate"));
    panel.append(strip);

    if(!c){
      panel.append(el("div",{class:"card"},
        el("p",{class:"muted",style:"margin:0 0 10px"},
          "No recurring consultation time is set for "+s.name+" yet."),
        S.role==="supervisor"&&s.principalUid===S.uid
          ? el("button",{class:"btn",onclick:()=>consultForm(s,null,()=>renderStudentAfterReload(studentId))},"Set consultation time")
          : el("span",{class:"muted"},"The principal supervisor needs to set a time first.")));
      return;
    }

    // header card: recurring time + link
    const head=el("div",{class:"card",style:"margin-bottom:14px"});
    head.append(
      el("div",{class:"row",style:"justify-content:space-between;align-items:flex-start"},
        el("div",{},
          el("div",{class:"eyebrow ui"},"Recurring consultation"),
          el("div",{style:"font-size:20px;font-weight:700"},`${c.day} ${c.start}–${c.end}`),
          el("div",{class:"muted ui",style:"margin-top:2px"},(c.mode||"")+(c.coName?" · Co-supervisor: "+c.coName:" · No co-supervisor"))),
        el("div",{class:"row"},
          c.meetingLink?el("a",{class:"linkpill",href:c.meetingLink,target:"_blank",rel:"noopener"},"Meeting link"):el("span",{class:"muted"},"No link set"),
          (s.principalUid===S.uid||S.role==="admin")?el("button",{class:"btn ghost sm",onclick:()=>consultForm(s,c,()=>renderStudentAfterReload(studentId))},"Edit time / link"):"")));
    panel.append(head);

    const canEdit = (S.role==="supervisor" && s.principalUid===S.uid);

    const log=el("div",{class:"weeklog"});
    for(let w=1;w<=weeks;w++){
      log.append(weekRow(c,s,w,canEdit,studentId));
    }
    panel.append(log);

    if(!canEdit && S.role==="admin"){
      panel.append(el("p",{class:"muted ui",style:"margin-top:10px"},
        "Read-only for admin. To change times, links or the whole record, use Edit time / link above or the Consultations tab."));
    }
  }

  function weekRow(c,s,w,canEdit,studentId){
    const et=weekTime(c,w);
    const l=weekLog(c,w);
    const wk=el("div",{class:"wk"},el("div",{class:"num"},String(w)),el("div",{class:"lab"},"Week"));
    const body=el("div",{class:"wbody"});

    // meta line: effective time + override marker
    const meta=el("div",{class:"wmeta"});
    meta.append(el("span",{},`${et.day} ${et.start}–${et.end}`));
    if(et.mode) meta.append(el("span",{},"· "+et.mode));
    if(et.overridden) meta.append(el("span",{class:"pill blue",style:"font-size:11.5px"},"Changed this week"));
    if(et.link) meta.append(el("a",{class:"linkpill",href:et.link,target:"_blank",rel:"noopener"},"Link"));
    if(canEdit) meta.append(el("button",{class:"btn ghost xs",onclick:()=>weekOverrideForm(c,w,()=>renderStudentAfterReload(studentId))},
      et.overridden?"Edit this week":"Change time"));
    body.append(meta);

    // controls line
    const controls=el("div",{class:"row",style:"margin-top:8px;gap:14px"});

    // Held?
    controls.append(toggleGroup("Meeting held", l.held===true?"yes":l.held===false?"no":null,
      [["Held","yes","yes"],["Not held","no","no"]],
      canEdit, async(val)=>{
        const held = val==="yes";
        await patchWeek(c,w,{held});
        renderStudentAfterReload(studentId);
      }));

    // Student attended? (only meaningful if held)
    controls.append(toggleGroup("Student", l.studentAttended===true?"yes":l.studentAttended===false?"no":null,
      [["Attended","yes","yes"],["Absent","no","no"]],
      canEdit && l.held===true, async(val)=>{
        await patchWeek(c,w,{studentAttended: val==="yes"});
        renderStudentAfterReload(studentId);
      }));

    // Co-supervisor attended? (only if a co exists & held)
    if(c.coUid){
      controls.append(toggleGroup("Co-supervisor",
        l.coAttended==="yes"?"yes":l.coAttended==="no"?"no":l.coAttended==="na"?"na":null,
        [["Attended","yes","yes"],["Absent","no","no"],["N/A","na","na"]],
        canEdit && l.held===true, async(val)=>{
          await patchWeek(c,w,{coAttended: val});
          renderStudentAfterReload(studentId);
        }));
    }
    body.append(controls);

    // comment — saves automatically (debounced while typing, and on blur)
    if(canEdit){
      const ta=el("textarea",{placeholder:"Comment (optional) — e.g. progress, follow-ups, reason for absence"},l.comment||"");
      const status=el("span",{class:"muted ui",style:"font-size:12.5px;margin-left:8px"},"");
      let lastSaved=l.comment||"";
      let timer=null, saving=false;
      async function commit(){
        const val=ta.value.trim();
        if(val===lastSaved){ return; }      // nothing changed
        if(saving) return;
        saving=true; status.textContent="Saving…";
        try{
          await patchWeek(c,w,{comment:val}); // patchWeek updates the local copy too
          lastSaved=val; status.textContent="Saved";
          setTimeout(()=>{ if(status.textContent==="Saved") status.textContent=""; },1500);
        }catch(e){
          status.textContent="Not saved — check connection";
        }finally{ saving=false; }
      }
      ta.addEventListener("input",()=>{
        status.textContent="Editing…";
        clearTimeout(timer); timer=setTimeout(commit,900); // debounce
      });
      ta.addEventListener("blur",()=>{ clearTimeout(timer); commit(); });
      body.append(el("div",{class:"wcomment"},ta,
        el("div",{style:"margin-top:3px"},status)));
    } else if(l.comment){
      body.append(el("div",{class:"wcomment muted",style:"font-style:italic"},"\u201C"+l.comment+"\u201D"));
    }

    // status pill
    if(l.held===true){
      const sp = l.studentAttended===true ? el("span",{class:"pill held"},"Attended")
               : l.studentAttended===false ? el("span",{class:"pill missed"},"Missed")
               : el("span",{class:"pill none"},"Held");
      meta.prepend(sp);
    } else if(l.held===false){
      meta.prepend(el("span",{class:"pill none"},"Not held"));
    } else {
      meta.prepend(el("span",{class:"pill none"},"No record"));
    }

    return el("div",{class:"wrow"},wk,body);
  }

  // persist a partial update to a single week, merging into that week's data.
  // Writes only the one nested key (weeks.<n>) so Firestore can't drop it.
  async function patchWeek(c,w,partial){
    const key=String(w);
    const prev=(c.weeks?.[key]) || (c.weeks?.[w]) || {};
    const merged={...prev,...partial};
    // strip undefined so Firestore doesn't choke
    Object.keys(merged).forEach(k=>merged[k]===undefined&&delete merged[k]);
    await DB.updateWeek(c.id, key, merged);
    if(!c.weeks) c.weeks={};
    c.weeks[key]=merged; // keep local copy fresh
  }

  async function renderStudentAfterReload(studentId){
    cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});
    renderStudent(studentId);
  }

  sel.onchange=()=>renderStudent(sel.value);
  renderStudent(sel.value);
}

function statBox(n,l){ return el("div",{class:"b"},el("div",{class:"n"},n),el("div",{class:"l"},l)); }

// A small yes/no(/na) toggle group
function toggleGroup(label,current,options,enabled,onPick){
  const seg=el("div",{class:"seg3"});
  options.forEach(([txt,val,kind])=>{
    const b=el("button",{class:(current===val?"on "+kind:"")},txt);
    if(enabled) b.onclick=()=>onPick(val); else b.disabled=true;
    seg.append(b);
  });
  return el("div",{},el("div",{class:"muted ui",style:"font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600"},label),seg);
}

// Override a single week's time / link
function weekOverrideForm(c,w,done){
  const cur=(c.weeks?.[w]) || (c.weeks?.[String(w)]) || {};
  const useDefault=el("input",{type:"checkbox",style:"width:auto",...(!(cur.day||cur.start||cur.end||cur.mode||cur.link)?{checked:"checked"}:{})});
  const day=el("select",{},...DAYS.map(d=>el("option",{value:d,...(d===(cur.day||c.day)?{selected:"selected"}:{})},d)));
  const start=el("input",{type:"time",value:cur.start||c.start});
  const end=el("input",{type:"time",value:cur.end||c.end});
  const mode=el("select",{},...["Online","In person","Hybrid"].map(m=>el("option",{value:m,...(m===(cur.mode||c.mode)?{selected:"selected"}:{})},m)));
  const link=el("input",{value:cur.link||"",placeholder:"Leave blank to use the recurring link"});

  modal("Week "+w+" — change time",
    el("div",{class:"grid"},
      el("label",{class:"ui",style:"display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--ink)"},
        useDefault," Use the recurring time for this week (no change)"),
      el("div",{class:"grid",style:"grid-template-columns:1fr 1fr"},
        el("div",{style:"grid-column:1/-1"},el("label",{},"Day"),day),
        el("div",{},el("label",{},"Start"),start),
        el("div",{},el("label",{},"End"),end),
        el("div",{style:"grid-column:1/-1"},el("label",{},"Mode"),mode),
        el("div",{style:"grid-column:1/-1"},el("label",{},"Meeting link for this week"),link))),
    async()=>{
      const key=String(w);
      const keep=(c.weeks?.[key]) || (c.weeks?.[w]) || {};
      // preserve the logging fields (held / attendance / comment), only change overrides
      const logged={held:keep.held,studentAttended:keep.studentAttended,coAttended:keep.coAttended,comment:keep.comment};
      let weekData;
      if(useDefault.checked){
        weekData={...logged}; // strip overrides — back to recurring time
      } else {
        if(start.value>=end.value){ toast("End must be after start.",true); return false; }
        weekData={...logged, day:day.value,start:start.value,end:end.value,mode:mode.value,link:link.value.trim()};
      }
      // clean undefined keys
      Object.keys(weekData).forEach(k=>weekData[k]===undefined&&delete weekData[k]);
      await DB.updateWeek(c.id, key, weekData);
      if(!c.weeks) c.weeks={};
      c.weeks[key]=weekData; // local copy fresh so re-render shows the new time
      toast("Week "+w+" updated."); done(); return true;
    });
}


/* ============================================================
   9b. CO-SUPERVISOR LOG  (principal & admin)
   Ad-hoc record of co-supervisor involvement per student. Unlike
   the weekly Supervision diary, entries are created on demand —
   add as many or as few sessions as needed, each with its own date,
   title, whether the co-supervisor attended, and a note.
   ============================================================ */
async function viewCoSupLog(v){
  v.innerHTML="";
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Co-supervisor involvement"),
    el("h2",{},"Co-supervisor log"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewCoSupLog(v)));
  v.append(bar);
  v.append(el("p",{class:"muted ui",style:"margin-top:-6px"},
    "A flexible record of when the co-supervisor was involved with a student. Add an entry for each session, review, or meeting — there's no fixed weekly schedule. Principals log for their own students; admins can log for anyone."));

  // students this user may log against
  let students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  if(S.role==="supervisor") students=students.filter(s=>s.principalUid===S.uid);
  // only students that actually have a co-supervisor are loggable
  const withCo=students.filter(s=>s.coUid);
  if(!withCo.length){
    v.append(emptyState("No students with a co-supervisor",
      S.role==="supervisor"
        ? "None of your students have a co-supervisor assigned this semester."
        : "Assign a co-supervisor to a student first (Students tab)."));
    return;
  }

  // student picker
  const sel=el("select",{style:"width:auto;min-width:240px"});
  withCo.forEach(s=>sel.append(el("option",{value:s.id},s.name+" · co: "+(s.coName||"—"))));
  v.append(el("div",{class:"toolbar"},el("div",{class:"field"},el("label",{},"Student"),sel)));

  const panel=el("div",{});
  v.append(panel);

  async function renderFor(studentId){
    panel.innerHTML="";
    const s=withCo.find(x=>x.id===studentId);
    let logs=(await DB.list("costLogs", S.activeSem?{semesterId:S.activeSem}:{}))
      .filter(l=>l.studentDocId===studentId);
    logs.sort((a,b)=>(a.date<b.date?1:-1)); // newest first

    // summary
    const total=logs.length;
    const present=logs.filter(l=>l.coAttended==="yes").length;
    const absent=logs.filter(l=>l.coAttended==="no").length;
    panel.append(el("div",{class:"stat"},
      statBox(String(total),"Log entries"),
      statBox(String(present),"Co-supervisor present"),
      statBox(String(absent),"Co-supervisor absent")));

    // add button
    panel.append(el("div",{class:"row",style:"margin-bottom:12px"},
      el("button",{class:"btn",onclick:()=>coSupForm(s,null,()=>renderFor(studentId))},"+ Add log entry")));

    if(!logs.length){
      panel.append(emptyState("No entries yet for "+s.name,
        "Add an entry whenever the co-supervisor ("+(s.coName||"—")+") meets the student or contributes to supervision."));
      return;
    }

        actions.append(el("button",{class:"btn ghost sm",onclick:()=>coSupForm(s,l,()=>renderFor(studentId))},"Edit"),
          el("button",{class:"btn danger sm",onclick:()=>confirmDelete("costLogs",l.id,"this log entry",()=>renderFor(studentId))},"Delete"));
      }
      tb.append(el("tr",{},
        el("td",{},el("strong",{},fmtDate(l.date))),
        el("td",{},l.title||"—"),
        el("td",{},l.coName||"—"),

        el("td",{class:"muted",style:"max-width:280px;white-space:normal"},l.note||"—"),
        el("td",{class:"muted"},l.createdByName||"—"),
        el("td",{},actions)));
    });
    t.append(tb); card.append(t); panel.append(card);
  }

  sel.onchange=()=>renderFor(sel.value);
  renderFor(sel.value);
}

function fmtDate(d){
  if(!d) return "—";
  const dt=new Date(d+"T00:00:00");
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});
}

/* ============================================================
   10. SUMMARY REPORT (admin) — oversight + CSV
   Shows, per principal supervisor and per student, whether the
   consultation is arranged, how many meetings held, and attendance.
   ============================================================ */
async function viewReport(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Oversight · "+(sem?.label||""),),
    el("h2",{},"Supervision summary"))));
  const bar=el("div",{class:"toolbar"}); bar.append(semesterPicker(()=>viewReport(v)));
  v.append(bar);

  const students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  const cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});
  if(!students.length){ v.append(emptyState("Nothing to report yet","Add students and meetings first.")); return; }

  // overall stats
  const rows=students.map(s=>{
    const c=cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid);
    const st=c?consultStats(c,weeks):{held:0,attended:0,missed:0,logged:0};
    return {s,c,st,arranged:!!c};
  });
  const arranged=rows.filter(r=>r.arranged).length;
  const noTime=rows.length-arranged;
  const totalHeld=rows.reduce((a,r)=>a+r.st.held,0);
  const totalAttended=rows.reduce((a,r)=>a+r.st.attended,0);

  v.append(el("div",{class:"stat"},
    statBox(String(rows.length),"Students"),
    statBox(String(arranged),"Consultation set"),
    statBox(String(noTime),"No time set"),
    statBox(String(totalHeld),"Meetings held"),
    statBox(totalHeld?Math.round(totalAttended/totalHeld*100)+"%":"—","Attendance rate")));

  v.append(el("div",{class:"row",style:"margin-bottom:14px"},
    el("button",{class:"btn",onclick:()=>downloadReportCSV(rows,sem,weeks)},"Download report CSV"),
    el("button",{class:"btn ghost",onclick:()=>window.print()},"Print / PDF")));

  // group by principal supervisor
  const byPrin={};
  rows.forEach(r=>{ const k=r.s.principalName||"Unassigned"; (byPrin[k] ||= []).push(r); });

  Object.keys(byPrin).sort().forEach(prin=>{
    const card=el("div",{class:"card",style:"margin-bottom:14px;padding:0;overflow:hidden"});
    card.append(el("div",{style:"padding:11px 16px;background:#0000000a;border-bottom:1px solid var(--line);display:flex;justify-content:space-between"},
      el("strong",{class:"ui"},"Principal: "+prin),
      el("span",{class:"muted ui"},byPrin[prin].length+" student"+(byPrin[prin].length>1?"s":""))));
    const t=el("table",{});
    t.append(el("thead",{},el("tr",{},...["Student","Campus","Co-supervisor","Time arranged","Held","Attended","Missed","Co present","Last comment"].map(h=>el("th",{},h)))));
    const tb=el("tbody",{});
    byPrin[prin].forEach(({s,c,st})=>{
      // co presence count
      let coYes=0,coNo=0;
      if(c) for(let w=1;w<=weeks;w++){ const l=weekLog(c,w); if(l?.coAttended==="yes")coYes++; else if(l?.coAttended==="no")coNo++; }
      // last comment
      let lastComment="";
      if(c) for(let w=weeks;w>=1;w--){ const cm=weekLog(c,w)?.comment; if(cm){ lastComment="W"+w+": "+cm; break; } }
      tb.append(el("tr",{},
        el("td",{},el("strong",{},s.name)),
        el("td",{},s.campus),
        el("td",{},s.coName||"—"),
        el("td",{}, c?el("span",{class:"pill held"},`${c.day} ${c.start}`):el("span",{class:"pill missed"},"Not set")),
        el("td",{},String(st.held)),
        el("td",{},String(st.attended)),
        el("td",{},String(st.missed)),
        el("td",{}, c?.coUid?`${coYes}/${coYes+coNo}`:el("span",{class:"muted"},"—")),
        el("td",{class:"muted",style:"max-width:220px;white-space:normal"},lastComment||"—")));
    });
    t.append(tb); card.append(t); v.append(card);
  });
}
function downloadReportCSV(rows,sem,weeks){
  const head=["student","sid","campus","principal","co_supervisor","time_arranged","recurring_time","meetings_held","student_attended","student_missed","co_present","attendance_rate"];
  const lines=[head.join(",")];
  rows.forEach(({s,c,st})=>{
    let coYes=0,coTot=0;
    if(c) for(let w=1;w<=weeks;w++){ const l=weekLog(c,w); if(l?.coAttended==="yes"){coYes++;coTot++;} else if(l?.coAttended==="no")coTot++; }
    const rate=st.held?Math.round(st.attended/st.held*100)+"%":"";
    const cell=[
      s.name,s.sid,s.campus,s.principalName||"",s.coName||"",
      c?"yes":"no", c?`${c.day} ${c.start}-${c.end}`:"",
      st.held,st.attended,st.missed, c?.coUid?`${coYes}/${coTot}`:"", rate
    ];
    lines.push(cell.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const fname=`supervision_report_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("Report downloaded.");
}

function downloadTimetableCSV(rows,sem){
  const head=["unit","unit_name","semester","supervisor","day","start","end","room"];

    lines.push([unit?.code||"",unit?.name||"",sem?.label||"",supName(tt.supervisorUid),tt.day,tt.start,tt.end,(tt.room||"").replace(/,/g," ")].map(x=>`"${x}"`).join(","));

  const fname=`timetable_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("CSV downloaded.");
}

function semesterForm(existing,done){
  const label=el("input",{placeholder:"e.g. S2 2026",value:existing?.label||""});
  const weeks=el("select",{},
    el("option",{value:"12",...((existing?.weeks||12)===12?{selected:"selected"}:{})},"12 weeks"),
    el("option",{value:"15",...((existing?.weeks)===15?{selected:"selected"}:{})},"15 weeks"));

  const unitList=el("div",{class:"grid",style:"gap:8px"});
  const rows=[];
  function addRow(u){
    const id=u?.id||uid();
    const code=el("input",{value:u?.code||"",placeholder:"Code e.g. RES915"});
    const name=el("input",{value:u?.name||"",placeholder:"Name e.g. Research Project"});
    const del=el("button",{class:"btn ghost sm",type:"button"},"Remove");
    const wrap=el("div",{class:"row",style:"gap:8px;align-items:center"},
      el("div",{style:"flex:0 0 32%"},code),
      el("div",{style:"flex:1"},name),
      del);
    const rec={wrap,id,code,name};
    del.onclick=()=>{ const i=rows.indexOf(rec); if(i>=0)rows.splice(i,1); wrap.remove(); };
    rows.push(rec); unitList.append(wrap);
  }
  (unitsOf(existing).length?unitsOf(existing):[null]).forEach(addRow);
  const addBtn=el("button",{class:"btn ghost sm",type:"button",onclick:()=>addRow()},"+ Add another unit");

  modal(existing?"Edit semester & units":"Add semester",
    el("div",{class:"grid"},
      el("div",{class:"grid",style:"grid-template-columns:1fr 1fr"},
        el("div",{},el("label",{},"Semester label"),label),
        el("div",{},el("label",{},"Teaching weeks"),weeks)),
      el("div",{},el("label",{},"Units in this semester"),unitList,
        el("div",{style:"margin-top:8px"},addBtn)),
      el("div",{},el("p",{class:"muted",style:"margin:0"},"Add one or more units. Codes and names can differ each semester. Units appear on the student form, class timetables and the Moodle export."))),
    async()=>{
      if(!label.value.trim()){ toast("Enter a semester label.",true); return false; }
      const units=rows.map(r=>({id:r.id,code:r.code.value.trim(),name:r.name.value.trim()}))
        .filter(u=>u.code||u.name);
      if(!units.length){ toast("Add at least one unit.",true); return false; }
      if(units.some(u=>!u.code)){ toast("Each unit needs a code.",true); return false; }
      const data={label:label.value.trim(),weeks:parseInt(weeks.value),units};
      if(existing) await DB.update("semesters",existing.id,data);
      else await DB.add("semesters",data);
      S.semesters=await DB.list("semesters"); S.semesters.sort((a,b)=>(a.label>b.label?-1:1));
      if(!existing) S.activeSem=S.semesters.find(x=>x.label===data.label)?.id||S.semesters[0]?.id;
      toast(existing?"Semester updated.":"Semester added."); done(); return true;
    });
}

async function copyForward(fromSem,done){
  const label=el("input",{placeholder:"e.g. Year 2 — Semester 1"});
  const weeks=el("select",{},
    el("option",{value:"12",...((fromSem.weeks||12)===12?{selected:"selected"}:{})},"12 weeks"),
    el("option",{value:"15",...((fromSem.weeks)===15?{selected:"selected"}:{})},"15 weeks"));
  const us=unitsOf(fromSem);
  modal("Carry students forward",
    el("div",{class:"grid"},
      el("p",{class:"muted",style:"margin:0"},"Copies every student (with the same supervisors and unit enrolments) from \u201C"+fromSem.label+"\u201D into a new semester. The units below are carried over too. Timetables, consultations and meeting logs start fresh."),
      el("div",{},el("label",{},"New semester label"),label),
      el("div",{},el("label",{},"Teaching weeks"),weeks),
      el("div",{},el("label",{},"Units carried over"),
        el("p",{class:"muted",style:"margin:4px 0 0"},us.length?us.map(u=>u.code).filter(Boolean).join(", "):"None"))),
    async()=>{
      if(!label.value.trim()){ toast("Enter a label.",true); return false; }
      const units=us.map(u=>({id:u.id,code:u.code,name:u.name}));
      const newId=await DB.add("semesters",{label:label.value.trim(),weeks:parseInt(weeks.value),units});
      const students=await DB.list("students",{semesterId:fromSem.id});
      for(const s of students){
        const {id,...rest}=s; await DB.add("students",{...rest,semesterId:newId});
      }
      S.semesters=await DB.list("semesters"); S.semesters.sort((a,b)=>(a.label>b.label?-1:1)); S.activeSem=newId;
      toast(`Carried ${students.length} students forward.`); done(); return true;
    },"Carry forward");
}

/* ============================================================
   13. STUDENT READ-ONLY VIEW
   Shows: class time(s), consultation time + meeting link, and the
   student's own week-by-week attendance (attended / missed).
   ============================================================ */
async function renderStudentView(sid,enrolments,sems){
  const wrap=el("div",{class:"auth-wrap",style:"align-items:flex-start;padding-top:30px"});
  const col=el("div",{style:"width:100%;max-width:760px"});
  const stu=enrolments[0];
  col.append(el("div",{class:"card",style:"border-top:4px solid var(--blue);margin-bottom:16px"},
    el("div",{class:"eyebrow ui",style:"color:var(--blue)"},"Read-only student view"),
    el("h1",{style:"font-size:24px;margin:2px 0"},stu.name),
    el("p",{class:"muted",style:"margin:0"},"ID "+sid+" · "+stu.email),
    el("div",{class:"row",style:"margin-top:10px"},
      el("button",{class:"btn ghost sm",onclick:()=>renderLogin()},"← Back"))));

  for(const en of enrolments){
    const sem=sems.find(s=>s.id===en.semesterId);
    const weeks=sem?.weeks||12;
    const myUnitIds=en.unitIds||[];
    const myUnitCodes=myUnitIds.map(id=>unitById(sem,id)?.code).filter(Boolean);
    const card=el("div",{class:"card",style:"margin-bottom:14px"});
    card.append(
      el("div",{class:"eyebrow ui"},myUnitCodes.length?myUnitCodes.join(" · "):"No units"),
      el("h3",{style:"margin-top:2px"},sem?.label||"Semester"),
      el("p",{class:"muted",style:"margin:4px 0 12px"},"Campus: "+en.campus+
        " · Principal: "+(en.principalName||"—")+(en.coName?" · Co: "+en.coName:"")));

    // ---- Weekly classes ----
    const tts=(await DB.list("timetables",{semesterId:en.semesterId}))
      .filter(t=>t.status==="approved"&&myUnitIds.includes(t.unitId));
    card.append(el("div",{style:"font-weight:600;margin-bottom:4px",class:"ui"},"Weekly classes"));
    if(tts.length) tts.forEach(t=>{
      const u=unitById(sem,t.unitId);
      card.append(el("p",{style:"margin:2px 0"},`${u?.code?u.code+" · ":""}${t.day} ${t.start}–${t.end} · ${t.room||""}`));
    });
    else card.append(el("p",{class:"muted",style:"margin:2px 0"},"Class times not published yet."));

    // ---- Consultation (recurring) + meeting link ----
    const cons=(await DB.list("consultations",{semesterId:en.semesterId}))
      .filter(c=>c.studentDocId===en.id);
    card.append(el("div",{style:"font-weight:600;margin:14px 0 4px",class:"ui"},"My consultation"));
    if(cons.length){
      cons.forEach(c=>{
        const block=el("div",{style:"margin:2px 0 6px"});
        block.append(el("p",{style:"margin:2px 0"},
          `${c.day} ${c.start}–${c.end}${c.mode?" · "+c.mode:""}`+(c.principalName?" · with "+c.principalName:"")));
        if(c.meetingLink) block.append(el("a",{class:"linkpill",href:c.meetingLink,target:"_blank",rel:"noopener"},"Join meeting"));
        card.append(block);

        // ---- My attendance, week by week ----
        const log=c.weeks||{};
        const anyLogged=Object.keys(log).length>0;
        card.append(el("div",{style:"font-weight:600;margin:12px 0 6px",class:"ui"},"My attendance"));
        if(!anyLogged){
          card.append(el("p",{class:"muted",style:"margin:2px 0"},"No meetings recorded yet."));
        } else {
          const grid=el("div",{style:"display:flex;flex-wrap:wrap;gap:6px"});
          for(let w=1;w<=weeks;w++){
            const l=weekLog(c,w);
            let cls="none",txt="W"+w;
            if(l?.held===true){
              if(l.studentAttended===true){ cls="held"; txt="W"+w+" ✓"; }
              else if(l.studentAttended===false){ cls="missed"; txt="W"+w+" ✗"; }
              else { cls="none"; txt="W"+w+" ·"; }
            } else if(l?.held===false){ cls="none"; txt="W"+w+" —"; }
            else continue; // unrecorded weeks: skip in student view
            const et=weekTime(c,w);
            const pill=el("span",{class:"pill "+cls,title:`${et.day} ${et.start}–${et.end}`+(l?.comment?" · "+l.comment:"")},txt);
            grid.append(pill);
          }
          if(!grid.children.length) grid.append(el("span",{class:"muted"},"No meetings recorded yet."));
          card.append(grid);
          // legend
          card.append(el("p",{class:"muted ui",style:"margin:8px 0 0;font-size:13px"},
            "✓ attended · ✗ missed · — not held · hover a week for the time and any note."));
        }
      });
    } else card.append(el("p",{class:"muted",style:"margin:2px 0"},"Consultation time not set yet."));

    col.append(card);
  }
  wrap.append(col);
  document.body.append(wrap, toastNode());
}

/* ============================================================
   14. SHARED MODAL + DELETE
   ============================================================ */
function modal(title,bodyNode,onSave,saveLabel="Save"){
  const bg=el("div",{class:"modal-bg",onclick:e=>{if(e.target===bg)close();}});
  const saveBtn=el("button",{class:"btn"},saveLabel);
  function close(){ bg.remove(); }
  saveBtn.onclick=async()=>{ saveBtn.disabled=true; const ok=await onSave(); saveBtn.disabled=false; if(ok!==false)close(); };
  const m=el("div",{class:"modal ui"},
    el("h3",{},title), bodyNode,
    el("div",{class:"row",style:"justify-content:flex-end;margin-top:18px"},
      el("button",{class:"btn ghost",onclick:close},"Cancel"), saveBtn));
  bg.append(m); document.body.append(bg);
}
// confirmDelete: deletes a record. If cascade=true and it's a student/consultation,
// related records are tidied up so no orphan logs remain.
function confirmDelete(coll,id,name,done,custom){
  modal("Delete "+name+"?",
    el("p",{class:"muted",style:"margin:0"},"This cannot be undone."+
      (coll==="students"?" Linked consultations and meeting logs for this student are also removed.":"")+
      (coll==="semesters"?" Students, timetables and consultations in this semester remain but will be orphaned — delete with care.":"")),
    async()=>{
      if(custom){ await done(); return true; }
      if(coll==="students"){
        const cs=await DB.list("consultations",{studentDocId:id});
        for(const c of cs) await DB.remove("consultations",c.id);
        const ats=await DB.list("attendance",{studentDocId:id});
        for(const a of ats) await DB.remove("attendance",a.id);
      }
      await DB.remove(coll,id); toast("Deleted."); done(); return true;
    },"Delete");
  const btns=document.querySelectorAll(".modal .btn"); btns[btns.length-1].classList.add("danger");
}

/* ============================================================
   15. BOOTSTRAP
   ============================================================ */
if(DEMO){
  renderLogin();
} else {
  onAuthStateChanged(auth, async (fbUser)=>{
    if(!fbUser){ renderLogin(); return; }
    const u=await DB.getUser(fbUser.uid);
    if(!u){ toast("No staff profile found for this login.",true); await signOut(auth); renderLogin(); return; }
    S.user={email:fbUser.email}; S.uid=fbUser.uid; S.role=u.role; S.userName=u.name;
    await afterLogin();
  });
}
window.addEventListener("error",e=>console.error(e));
