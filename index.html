<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MRes Supervision Hub</title>
<style>
  /* ============================================================
     DESIGN TOKENS
     Palette: "Field notebook" — ink, paper, supervisory teal,
     approval amber, alert clay. Ruled-paper structure, ink-on-cream.
     ============================================================ */
  :root{
    --ink:#14181c;
    --ink-soft:#39424a;
    --paper:#f6f3ec;
    --paper-2:#fffdf8;
    --line:#d4cdbe;
    --line-strong:#b0a896;
    --teal:#1a5f5b;
    --teal-deep:#0e423f;
    --amber:#b97c0c;
    --amber-soft:#f3e3bf;
    --clay:#a8401f;
    --clay-soft:#f1d9d2;
    --green:#367044;
    --green-soft:#d2e6d3;
    --blue:#33548a;
    --blue-soft:#d6e1f1;
    --shadow:0 1px 0 var(--line-strong),0 6px 24px -12px rgba(28,32,36,.4);
    --r:10px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.55;font-size:16.5px;
  }
  body, input, select, button, textarea{font-family:inherit}
  .ui{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  h1,h2,h3{font-weight:600;letter-spacing:-.01em;line-height:1.15;margin:0}
  a{color:var(--teal-deep)}
  button{cursor:pointer;font-size:15px}
  input,select,textarea{
    font-size:15.5px;padding:10px 12px;border:1px solid var(--line-strong);
    border-radius:8px;background:var(--paper-2);color:var(--ink);width:100%;
  }
  textarea{resize:vertical;min-height:62px;line-height:1.45}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal)}
  label{font-size:13.5px;font-weight:700;color:var(--ink-soft);display:block;margin:0 0 5px;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-transform:uppercase;letter-spacing:.04em}
  .btn{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--teal-deep);
    background:var(--teal);color:#fff;padding:10px 16px;border-radius:8px;font-weight:600;font-size:15px;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    transition:filter .12s;width:auto;
  }
  .btn:hover{filter:brightness(1.07)}
  .btn:active{filter:brightness(.95)}
  .btn.ghost{background:transparent;color:var(--teal-deep);border-color:var(--line-strong)}
  .btn.ghost:hover{background:#0000000a;filter:none}
  .btn.danger{background:var(--clay);border-color:#7e3017}
  .btn.amber{background:var(--amber);border-color:#8a5b0a}
  .btn.blue{background:var(--blue);border-color:#264068;color:#fff}
  .btn.sm{padding:6px 12px;font-size:13.5px;border-radius:6px}
  .btn.xs{padding:4px 10px;font-size:12.5px;border-radius:6px}
  .btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:12px}
  .card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
  .muted{color:var(--ink-soft);font-size:14.5px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;
    padding:4px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;
    font-family:ui-sans-serif,system-ui,sans-serif}
  .pill.pending{background:var(--amber-soft);color:#7a5408}
  .pill.approved{background:var(--green-soft);color:#235c30}
  .pill.none{background:#eee9dd;color:#6b6555}
  .pill.held{background:var(--green-soft);color:#235c30}
  .pill.missed{background:var(--clay-soft);color:#7e3017}
  .pill.blue{background:var(--blue-soft);color:#264068}
  table{width:100%;border-collapse:collapse;font-size:15px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-family:ui-sans-serif,system-ui,sans-serif;font-size:12.5px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--ink-soft);font-weight:700}
  tr:hover td{background:#0000000d}
  .hidden{display:none!important}

  header.app{
    background:var(--ink);color:var(--paper);padding:0 22px;
    display:flex;align-items:center;justify-content:space-between;height:62px;
    border-bottom:3px solid var(--teal);
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{
    width:36px;height:36px;border-radius:7px;background:var(--teal);
    display:grid;place-items:center;font-weight:700;color:#fff;font-family:ui-sans-serif,sans-serif;
    box-shadow:inset 0 0 0 1px #ffffff22;
  }
  .brand h1{font-size:18px;color:var(--paper)}
  .brand .sub{font-size:11.5px;color:#c4bdac;font-family:ui-sans-serif,sans-serif;letter-spacing:.05em;text-transform:uppercase}
  .who{display:flex;align-items:center;gap:12px;font-family:ui-sans-serif,sans-serif;font-size:14px}
  .who .role{font-size:11.5px;color:#c4bdac;text-transform:uppercase;letter-spacing:.05em}

  main{max-width:1180px;margin:0 auto;padding:22px}
  nav.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;border-bottom:1px solid var(--line)}
  nav.tabs button{
    background:none;border:none;padding:12px 15px;font-weight:600;color:var(--ink-soft);
    font-family:ui-sans-serif,system-ui,sans-serif;font-size:15px;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  nav.tabs button.active{color:var(--teal-deep);border-bottom-color:var(--teal)}
  nav.tabs button:hover{color:var(--ink)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
  .field{min-width:150px}
  .section-title{display:flex;align-items:center;gap:10px;margin:0 0 14px}
  .section-title h2{font-size:24px}
  .eyebrow{font-family:ui-sans-serif,sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--teal-deep);margin-bottom:3px}

  .auth-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:
      repeating-linear-gradient(transparent,transparent 31px,#0000000a 31px,#0000000a 32px),
      var(--paper);
  }
  .auth-card{width:100%;max-width:400px;background:var(--paper-2);border:1px solid var(--line);
    border-radius:14px;padding:30px;box-shadow:var(--shadow);border-top:4px solid var(--teal)}
  .auth-card .mark-lg{width:46px;height:46px;border-radius:10px;background:var(--teal);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:20px;font-family:ui-sans-serif,sans-serif;margin-bottom:14px}
  .seg{display:flex;background:#0000000d;border-radius:9px;padding:3px;margin:16px 0;gap:3px}
  .seg button{flex:1;border:none;background:none;padding:8px;border-radius:7px;font-weight:600;
    font-family:ui-sans-serif,sans-serif;color:var(--ink-soft)}
  .seg button.active{background:var(--paper-2);color:var(--teal-deep);box-shadow:var(--shadow)}

  .modal-bg{position:fixed;inset:0;background:rgba(28,32,36,.5);display:grid;place-items:center;padding:18px;z-index:50}
  .modal{background:var(--paper-2);border-radius:14px;max-width:560px;width:100%;padding:24px;
    box-shadow:0 20px 60px -20px rgba(0,0,0,.5);max-height:90vh;overflow:auto}
  .modal.wide{max-width:760px}
  .modal h3{font-size:19px;margin-bottom:14px}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);
    background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:9px;
    font-family:ui-sans-serif,sans-serif;font-size:14px;z-index:99;transition:transform .25s;box-shadow:var(--shadow);max-width:90vw}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--clay)}

  .att-grid{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--paper-2)}
  .att-grid table{font-size:14px;min-width:640px}
  .att-grid th, .att-grid td{white-space:nowrap}
  .att-cell{cursor:pointer;text-align:center;width:34px;font-weight:700;user-select:none}
  .att-cell.P{background:var(--green-soft);color:#235c30}
  .att-cell.A{background:#f1d9d2;color:#8f3823}
  .att-cell.E{background:var(--amber-soft);color:#7a5408}
  .att-cell.-{color:#c7c0b0}

  .empty{text-align:center;padding:48px 20px;color:var(--ink-soft)}
  .empty .big{font-size:30px;margin-bottom:8px;opacity:.5}
  .stat{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .stat .b{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;min-width:130px}
  .stat .n{font-size:30px;font-weight:700;font-family:ui-sans-serif,sans-serif;color:var(--ink)}
  .stat .l{font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-family:ui-sans-serif,sans-serif;font-weight:600}

  /* Weekly meeting log */
  .weeklog{border:1px solid var(--line-strong);border-radius:var(--r);overflow:hidden}
  .weeklog .wrow{display:grid;grid-template-columns:72px 1fr;border-bottom:1px solid var(--line)}
  .weeklog .wrow:last-child{border-bottom:none}
  .weeklog .wk{background:#0000000f;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:12px 4px;font-family:ui-sans-serif,sans-serif;border-right:1px solid var(--line)}
  .weeklog .wk .num{font-size:22px;font-weight:800;color:var(--ink)}
  .weeklog .wk .lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600}
  .weeklog .wbody{padding:13px 14px}
  .weeklog .wmeta{display:flex;gap:9px;flex-wrap:wrap;align-items:center;font-size:14px;font-family:ui-sans-serif,sans-serif;color:var(--ink)}
  .seg3{display:inline-flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden}
  .seg3 button{border:none;background:var(--paper-2);padding:7px 13px;font-size:13.5px;font-weight:600;
    font-family:ui-sans-serif,sans-serif;color:var(--ink-soft);border-right:1px solid var(--line)}
  .seg3 button:last-child{border-right:none}
  .seg3 button.on.yes{background:var(--green);color:#fff}
  .seg3 button.on.no{background:var(--clay);color:#fff}
  .seg3 button.on.na{background:var(--ink-soft);color:#fff}
  .wcomment{margin-top:10px}
  .wcomment textarea{min-height:44px;font-size:14.5px}
  .linkpill{font-family:ui-sans-serif,sans-serif;font-size:13px;display:inline-flex;align-items:center;gap:5px;
    background:var(--blue-soft);color:#22406a;padding:4px 11px;border-radius:99px;text-decoration:none;font-weight:700}

  details.help{margin-top:14px;font-size:14px}
  details.help summary{cursor:pointer;font-family:ui-sans-serif,sans-serif;color:var(--teal-deep);font-weight:600}
  code{background:#0000000d;padding:1px 5px;border-radius:4px;font-size:13.5px}

  @media (max-width:640px){
    main{padding:14px}
    .who .name{display:none}
    th,td{padding:8px 7px}
  }
  @media print{
    header.app,nav.tabs,.toolbar,.btn,#toast{display:none!important}
    body{background:#fff}
    .card{box-shadow:none;border:1px solid #999}
  }
</style>

import {

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ============================================================

const firebaseConfig = {

let app, auth, db, DEMO = false;
try {

  app = initializeApp(firebaseConfig);

  db = getFirestore(app);
} catch(e){

  console.warn("Firebase not configured — running in DEMO (in-memory) mode.");
}

/* ============================================================
   2. DATA LAYER
   Firestore structure:
     users/{uid}      -> {email,name,mobile,role:'admin'|'supervisor',
                          supRole:'both'|'principal'|'co'}
     semesters/{id}   -> {label, weeks, units:[{id,code,name}, ...]}
     students/{id}    -> {semesterId, sid, name, email, mobile, campus, unitIds:[...],
                          principalUid, coUid, principalName, coName}
     timetables/{id}  -> {semesterId, unitId, supervisorUid, day, start, end,
                          room, status:'pending'|'approved'}   // class still admin-approved
     consultations/{id} -> {                                   // ONE per student per principal
                          semesterId, studentDocId, supervisorUid (principal),
                          coUid, coName, principalName,
                          day, start, end, mode, meetingLink,   // recurring default (no approval)
                          weeks:{                               // per-week LOG
                            <w>:{ day?,start?,end?,mode?,link?, // optional overrides
                                  held:bool, studentAttended:bool|null,
                                  coAttended:'yes'|'no'|'na'|null,
                                  comment:string }
                          }
                        }
     (attendance collection retained for back-compat reads only; new logging
      lives inside consultations.weeks so meetings + attendance are one record.)

     coslots/{id}     -> {                                   // co-supervisor's OWN diary
                          semesterId, supervisorUid,          // the co-supervisor
                          label, day, start, end, mode,
                          meetingLink, note
                        }
       A co-supervisor's own recurring consultation/office hours, independent
       of any one student. Use this when a co wants to offer their own slot
       instead of (or in addition to) following the principal's per-student
       consultation time. Visible to students they co-supervise and to the
       principal. No admin approval.

   Consultation times need NO admin approval — supervisors set & change them
   week to week. Class timetables still go through admin approval for Moodle.
   ============================================================ */

const mem = { users:{}, semesters:{}, students:{}, timetables:{}, consultations:{}, attendance:{}, messages:{}, coslots:{} };
let memSeed = false;
function seedDemo(){
  if(memSeed) return; memSeed=true;
  mem.users["admin1"]={email:"admin@uni.edu",name:"Admin Office",role:"admin",mobile:"+61 400 000 001"};
  mem.users["supA"]={email:"a.smith@uni.edu",name:"Dr Smith",role:"supervisor",supRole:"both",mobile:"+61 400 111 222"};
  mem.users["supB"]={email:"b.jones@uni.edu",name:"Dr Jones",role:"supervisor",supRole:"principal",mobile:"+61 400 333 444"};
  mem.users["supC"]={email:"c.patel@uni.edu",name:"Dr Patel",role:"supervisor",supRole:"co",mobile:"+61 400 555 666"};
  mem.semesters["s2-2026"]={label:"S2 2026",weeks:12,units:[
    {id:"u1",code:"RES915",name:"Literature, Methodology & Proposal"},
    {id:"u2",code:"RES920",name:"Research Project"}
  ]};
  mem.semesters["y2-s1"]={label:"Year 2 — Semester 1",weeks:12,units:[
    {id:"u3",code:"RES930",name:"Thesis"}
  ]};
  const mk=(id,o)=>mem.students[id]=o;
  mk("st1",{semesterId:"s2-2026",sid:"45001",name:"Aisha Khan",email:"aisha@stu.edu",mobile:"+61 411 111 111",campus:"NSW",unitIds:["u1","u2"],principalUid:"supA",coUid:"supC",principalName:"Dr Smith",coName:"Dr Patel"});
  mk("st2",{semesterId:"s2-2026",sid:"45002",name:"Tom Reilly",email:"tom@stu.edu",mobile:"+61 422 222 222",campus:"NSW",unitIds:["u1"],principalUid:"supA",coUid:"",principalName:"Dr Smith",coName:""});
  mk("st3",{semesterId:"s2-2026",sid:"45003",name:"Mei Lin",email:"mei@stu.edu",mobile:"",campus:"ACT",unitIds:["u2"],principalUid:"supB",coUid:"supC",principalName:"Dr Jones",coName:"Dr Patel"});
  mem.timetables["tt1"]={semesterId:"s2-2026",unitId:"u1",supervisorUid:"supA",day:"Tuesday",start:"10:00",end:"13:00",room:"NSW Rm 4.12",status:"approved"};
  // sample consultation with a couple of weeks logged
  mem.consultations["c1"]={semesterId:"s2-2026",studentDocId:"st1",supervisorUid:"supA",
    coUid:"supC",coName:"Dr Patel",principalName:"Dr Smith",
    day:"Wednesday",start:"14:00",end:"14:30",mode:"Online",
    meetingLink:"https://teams.microsoft.com/l/meetup/aisha-weekly",
    weeks:{
      1:{held:true,studentAttended:true,coAttended:"yes",comment:"Discussed proposal scope."},
      2:{held:true,studentAttended:false,coAttended:"na",comment:"Student unwell, rescheduled offline."},
      3:{held:true,studentAttended:true,coAttended:"no",comment:""}
    }};
  // sample co-supervisor own diary slot (Dr Patel offers a weekly drop-in)
  mem.coslots["cs1"]={semesterId:"s2-2026",supervisorUid:"supC",
    label:"Drop-in office hours",day:"Thursday",start:"11:00",end:"12:00",
    mode:"Online",meetingLink:"https://teams.microsoft.com/l/meetup/patel-dropin",
    note:"Open to all students I co-supervise — bring methods questions."};
  // sample messages.
  // Recipient is either staff (toType 'staff', toUid) or a student (toType
  // 'student', toSid). Students are read-only and cannot send.
  mem.messages["m1"]={fromUid:"supA",fromName:"Dr Smith",fromRole:"supervisor",
    toType:"staff",toUid:"supC",toName:"Dr Patel",
    body:"Could you join Aisha's week 5 consultation? We'll be reviewing her methodology.",
    ts:Date.parse("2026-03-01T09:15:00"),readBy:{}};
  mem.messages["m2"]={fromUid:"supC",fromName:"Dr Patel",fromRole:"supervisor",
    toType:"staff",toUid:"supA",toName:"Dr Smith",
    body:"Yes, I can make week 5. I'll prepare comments on her sampling plan beforehand.",
    ts:Date.parse("2026-03-01T11:40:00"),readBy:{}};
  mem.messages["m3"]={fromUid:"supA",fromName:"Dr Smith",fromRole:"supervisor",
    toType:"student",toSid:"45001",toName:"Aisha Khan",
    body:"Great progress this week. Please send your updated chapter draft before our next meeting.",
    ts:Date.parse("2026-03-02T14:05:00"),readBy:{}};
}

const DB = {
  async getUser(uid){
    if(DEMO){ return mem.users[uid]||null; }
    const s = await getDoc(doc(db,"users",uid)); return s.exists()?s.data():null;
  },
  async setUser(uid,data){ if(DEMO){mem.users[uid]={...mem.users[uid],...data};return;} await setDoc(doc(db,"users",uid),data,{merge:true}); },
  async updateUser(uid,data){ if(DEMO){mem.users[uid]={...mem.users[uid],...data};return;} await updateDoc(doc(db,"users",uid),data); },
  async removeUser(uid){ if(DEMO){ delete mem.users[uid]; return; } await deleteDoc(doc(db,"users",uid)); },
  async findUserByEmail(email){
    if(DEMO){ const e=Object.entries(mem.users).find(([k,v])=>v.email===email); return e?{uid:e[0],...e[1]}:null; }
    const q=query(collection(db,"users"),where("email","==",email)); const r=await getDocs(q);
    return r.empty?null:{uid:r.docs[0].id,...r.docs[0].data()};
  },
  async listUsers(){
    if(DEMO){ return Object.entries(mem.users).map(([id,v])=>({id,...v})); }
    const r=await getDocs(collection(db,"users")); return r.docs.map(d=>({id:d.id,...d.data()}));
  },
  async list(coll, filters={}){
    if(DEMO){
      return Object.entries(mem[coll]||{}).map(([id,v])=>({id,...v}))
        .filter(o=>Object.entries(filters).every(([k,val])=>o[k]===val));
    }
    let qref=collection(db,coll); const fs=Object.entries(filters);
    if(fs.length){ qref=query(qref,...fs.map(([k,v])=>where(k,"==",v))); }
    const r=await getDocs(qref); return r.docs.map(d=>({id:d.id,...d.data()}));
  },
  async get(coll,id){
    if(DEMO){ return mem[coll][id]?{id,...mem[coll][id]}:null; }
    const s=await getDoc(doc(db,coll,id)); return s.exists()?{id,...s.data()}:null;
  },
  async add(coll,data){
    if(DEMO){ const id="x"+Math.random().toString(36).slice(2,9); mem[coll][id]={...data}; return id; }
    const r=await addDoc(collection(db,coll),data); return r.id;
  },
  async set(coll,id,data){
    if(DEMO){ mem[coll][id]={...mem[coll][id],...data}; return; }
    await setDoc(doc(db,coll,id),data,{merge:true});
  },
  async update(coll,id,data){
    if(DEMO){ mem[coll][id]={...mem[coll][id],...data}; return; }
    await updateDoc(doc(db,coll,id),data);
  },
  // Update ONE week inside a consultation's `weeks` map using Firestore's
  // nested field-path syntax. This rewrites only that single key (never the
  // whole map), which avoids stale-merge / cache issues that made per-week
  // time changes appear not to save. weekData fully replaces that week.
  async updateWeek(consId, weekKey, weekData){
    const key=String(weekKey);
    if(DEMO){
      const c=mem.consultations[consId]||{};
      const weeks={...(c.weeks||{})};
      weeks[key]=weekData;
      mem.consultations[consId]={...c, weeks};
      return;
    }
    const ref=doc(db,"consultations",consId);
    try{
      await updateDoc(ref, { ["weeks."+key]: weekData });
    }catch(err){
      // updateDoc fails if the doc/field is missing; setDoc+merge with a nested
      // object writes (and creates) just this week without touching siblings.
      await setDoc(ref, { weeks: { [key]: weekData } }, { merge:true });
    }
  },
  // Read a single consultation fresh from the server (bypasses list caching).
  async getConsultation(id){
    if(DEMO){ return mem.consultations[id]?{id,...mem.consultations[id]}:null; }
    const s=await getDoc(doc(db,"consultations",id));
    return s.exists()?{id,...s.data()}:null;
  },
  async remove(coll,id){ if(DEMO){ delete mem[coll][id]; return; } await deleteDoc(doc(db,coll,id)); }
};

const $ = s=>document.querySelector(s);
const el = (tag,props={},...kids)=>{
  const n=document.createElement(tag);
  for(const[k,v]of Object.entries(props)){
    if(k==="class")n.className=v; else if(k==="html")n.innerHTML=v;
    else if(k.startsWith("on"))n.addEventListener(k.slice(2),v);
    else n.setAttribute(k,v);
  }
  kids.flat().forEach(c=>n.append(c?.nodeType?c:document.createTextNode(c??"")));
  return n;
};
function toast(msg,isErr){ let t=$("#toast"); if(!t){ t=toastNode(); document.body.append(t); } t.textContent=msg; t.className="show"+(isErr?" err":""); setTimeout(()=>t.className="",2600); }

function activeSemester(){ return S.semesters.find(s=>s.id===S.activeSem)||null; }
function semOf(id){ return S.semesters.find(s=>s.id===id)||null; }
function unitsOf(sem){ return Array.isArray(sem?.units)?sem.units:[]; }
function unitById(sem,unitId){ return unitsOf(sem).find(u=>u.id===unitId)||null; }
function unitOneLine(u){
  if(!u) return "Unit";
  const code=(u.code||"").trim(), name=(u.name||"").trim();
  if(code&&name) return code+" · "+name;
  return code||name||"Unit";
}
function semUnitCodes(sem){
  const codes=unitsOf(sem).map(u=>(u.code||"").trim()).filter(Boolean);
  return codes.length?codes.join(", "):"No units";
}
function uid(){ return "u"+Math.random().toString(36).slice(2,9); }

function capOf(u){ return u?.supRole||"both"; }
function canBePrincipal(u){ return capOf(u)!=="co"; }
function canBeCo(u){ return capOf(u)!=="principal"; }
function capLabel(c){ return c==="principal"?"Principal only":c==="co"?"Co-supervisor only":"Principal & co"; }
function supName(uid){ const u=S.supervisors.find(x=>x.id===uid); return u?.name||u?.email||uid||"—"; }

// ---- Consultation / weekly-log helpers ----
// The effective time for a given week = week override (if any) else the recurring default.
function weekTime(cons,w){
  const ov=(cons?.weeks?.[w]) || (cons?.weeks?.[String(w)]) || {};
  return {
    day:   ov.day   || cons.day,
    start: ov.start || cons.start,
    end:   ov.end   || cons.end,
    mode:  ov.mode  || cons.mode,
    link:  ov.link  || cons.meetingLink,
    overridden: !!(ov.day||ov.start||ov.end||ov.mode||ov.link)
  };
}
function weekLog(cons,w){ return (cons?.weeks?.[w]) || (cons?.weeks?.[String(w)]) || {}; }
// counts across a consultation's weeks
function consultStats(cons,totalWeeks){
  let held=0, attended=0, missed=0, logged=0;
  for(let w=1;w<=totalWeeks;w++){
    const l=weekLog(cons,w); if(!Object.keys(l).length) continue;
    if(l.held===true||l.held===false) logged++;
    if(l.held===true){ held++;
      if(l.studentAttended===true) attended++;
      else if(l.studentAttended===false) missed++;
    }
  }
  return {held,attended,missed,logged};
}

function importCSV(done){
  const input=el("input",{type:"file",accept:".csv"});
  const preview=el("div",{class:"muted",style:"margin-top:10px"});
  let rows=[];
  input.onchange=()=>{
    const file=input.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=()=>{
      rows=parseCSV(r.result);
      preview.innerHTML="";
      if(!rows.length){ preview.textContent="Could not read any rows."; return; }
      preview.append(el("strong",{},rows.length+" rows ready. "),
        "Expected columns: name, sid, email, campus, units, principal_email, co_email");
    };
    r.readAsText(file);
  };
  const sem=activeSemester();
  modal("Upload students from CSV",
    el("div",{},
      el("p",{class:"muted",style:"margin-top:0"},"First row must be a header. Supervisors are matched by email and must have the right capability. The optional \u201Cunits\u201D column lists unit codes separated by ; or | and must match this semester's units. An optional \u201Cmobile\u201D column is also supported."),
      input, preview,
      el("details",{class:"help"},el("summary",{},"Show example CSV"),
        el("pre",{style:"background:#0000000d;padding:10px;border-radius:8px;overflow:auto;font-size:12px"},
          "name,sid,email,mobile,campus,units,principal_email,co_email\nAisha Khan,45001,aisha@stu.edu,+61 411 111 111,NSW,RES915;RES920,a.smith@uni.edu,c.patel@uni.edu\nTom Reilly,45002,tom@stu.edu,,NSW,RES915,a.smith@uni.edu,"))
    ),
    async()=>{
      if(!rows.length){ toast("Choose a CSV file first.",true); return false; }
      if(!S.activeSem){ toast("Create a semester first.",true); return false; }
      const units=unitsOf(sem);
      let ok=0;
      for(const row of rows){
        const pEmail=(row.principal_email||"").trim(), cEmail=(row.co_email||"").trim();
        let p=pEmail?S.supervisors.find(u=>u.email===pEmail):null;
        let c=cEmail?S.supervisors.find(u=>u.email===cEmail):null;
        if(p&&!canBePrincipal(p)) p=null;
        if(c&&!canBeCo(c)) c=null;
        if(!row.name||!row.sid) continue;
        const codes=(row.units||"").split(/[;|]/).map(x=>x.trim().toLowerCase()).filter(Boolean);
        const unitIds=units.filter(u=>codes.includes((u.code||"").toLowerCase())).map(u=>u.id);
        await DB.add("students",{
          semesterId:S.activeSem,sid:String(row.sid).trim(),name:row.name.trim(),
          email:(row.email||"").trim(),mobile:(row.mobile||"").trim(),campus:(row.campus||"").trim()||"NSW",unitIds,
          principalUid:p?.id||"",coUid:c?.id||"",principalName:p?.name||p?.email||"",coName:c?.name||c?.email||""
        });
        ok++;
      }
      toast(`Imported ${ok} student${ok!==1?"s":""}.`); done(); return true;
    },"Import");
}
function parseCSV(text){
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim().length);
  if(lines.length<2) return [];
  const split=l=>{
    const out=[];let cur="",q=false;
    for(const ch of l){ if(ch==='"'){q=!q;} else if(ch===","&&!q){out.push(cur);cur="";} else cur+=ch; }
    out.push(cur); return out.map(s=>s.trim());
  };
  const headers=split(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,"_"));
  return lines.slice(1).map(l=>{ const c=split(l); const o={}; headers.forEach((h,i)=>o[h]=c[i]??""); return o; });
}

  v.innerHTML="";

  v.append(bar);

  let students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  // Supervisors see students they principal- OR co-supervise. The principal
  // records the log; a co-supervisor sees the same record read-only.
  if(S.role==="supervisor") students=students.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  if(!students.length){
    v.append(emptyState("No students to log",
      S.role==="supervisor"?"You'll see the weekly record for students you principal- or co-supervise here.":"Add students first."));
    return;
  }
  let cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});

  // pick student — flag the supervisor's role so co-supervised entries are clear
  const sel=el("select",{style:"width:auto;min-width:240px"});
  if(S.role==="supervisor") students.sort((a,b)=>(a.principalUid===S.uid?0:1)-(b.principalUid===S.uid?0:1));
  students.forEach(s=>{
    const roleTag = S.role==="supervisor" ? (s.principalUid===S.uid?" · principal":" · co-supervisor") : "";

  const picker=el("div",{class:"toolbar"},el("div",{class:"field"},el("label",{},"Student"),sel));
  v.append(picker);

  const panel=el("div",{});
  v.append(panel);

  function consFor(studentId){
    const s=students.find(x=>x.id===studentId);
    return cons.find(c=>c.studentDocId===studentId && c.supervisorUid===s.principalUid);
  }

  async function renderStudent(studentId){
    panel.innerHTML="";
    const s=students.find(x=>x.id===studentId);

    // summary strip
    const stats = c ? consultStats(c,weeks) : {held:0,attended:0,missed:0,logged:0};

      statBox(String(stats.missed),"Student missed"),
      statBox(stats.held?Math.round(stats.attended/stats.held*100)+"%":"—","Attendance rate"));
    panel.append(strip);

    // who can arrange/change the per-student meeting TIME & LINK
    // (principal or admin only — a co-supervisor uses their own diary instead)
    const canSetTime = (S.role==="supervisor" && s.principalUid===S.uid) || S.role==="admin";
    // who records ATTENDANCE each week (principal only; admin & co are read-only)
    const canEdit = (S.role==="supervisor" && s.principalUid===S.uid);

    if(!c){
      panel.append(el("div",{class:"card"},
        el("p",{class:"muted",style:"margin:0 0 10px"},
          "No recurring consultation time is set for "+s.name+" yet."),
        canSetTime
          ? el("button",{class:"btn",onclick:()=>consultForm(s,null,()=>renderStudentAfterReload(studentId))},"Set consultation time")
          : el("span",{class:"muted"},"A supervisor needs to set a time first.")));
      return;
    }

    // header card: recurring time + link
    const head=el("div",{class:"card",style:"margin-bottom:14px"});
    head.append(
      el("div",{class:"row",style:"justify-content:space-between;align-items:flex-start"},
        el("div",{},
          el("div",{class:"eyebrow ui"},"Recurring consultation"),
          el("div",{style:"font-size:20px;font-weight:700"},`${c.day} ${c.start}–${c.end}`),
          el("div",{class:"muted ui",style:"margin-top:2px"},(c.mode||"")+(c.coName?" · Co-supervisor: "+c.coName:" · No co-supervisor"))),
        el("div",{class:"row"},
          c.meetingLink?el("a",{class:"linkpill",href:c.meetingLink,target:"_blank",rel:"noopener"},"Meeting link"):el("span",{class:"muted"},"No link set"),
          canSetTime?el("button",{class:"btn ghost sm",onclick:()=>consultForm(s,c,()=>renderStudentAfterReload(studentId))},"Edit time / link"):"")));
    panel.append(head);

    const log=el("div",{class:"weeklog"});
    for(let w=1;w<=weeks;w++){
      log.append(weekRow(c,s,w,canEdit,studentId));
    }
    panel.append(log);

    if(!canEdit && S.role==="admin"){
      panel.append(el("p",{class:"muted ui",style:"margin-top:10px"},
        "Read-only for admin. To change times, links or the whole record, use Edit time / link above or the Consultations tab."));
    }
    if(!canEdit && S.role==="supervisor" && s.coUid===S.uid){
      panel.append(el("p",{class:"muted ui",style:"margin-top:10px"},
        "You co-supervise "+s.name+". The recurring meeting time, link and weekly attendance are set by the principal supervisor"+(s.principalName?" ("+s.principalName+")":"")+" and are shown to you read-only. To offer your own time, use “My consultation hours” on the Consultations tab."));
    }
  }

  function weekRow(c,s,w,canEdit,studentId){
    const et=weekTime(c,w);
    const l=weekLog(c,w);
    const wk=el("div",{class:"wk"},el("div",{class:"num"},String(w)),el("div",{class:"lab"},"Week"));
    const body=el("div",{class:"wbody"});

    // meta line: effective time + override marker
    const meta=el("div",{class:"wmeta"});
    meta.append(el("span",{},`${et.day} ${et.start}–${et.end}`));
    if(et.mode) meta.append(el("span",{},"· "+et.mode));
    if(et.overridden) meta.append(el("span",{class:"pill blue",style:"font-size:11.5px"},"Changed this week"));
    if(et.link) meta.append(el("a",{class:"linkpill",href:et.link,target:"_blank",rel:"noopener"},"Link"));
    if(canEdit) meta.append(el("button",{class:"btn ghost xs",onclick:()=>weekOverrideForm(c,w,()=>renderStudentAfterReload(studentId))},
      et.overridden?"Edit this week":"Change time"));
    body.append(meta);

    // controls line
    const controls=el("div",{class:"row",style:"margin-top:8px;gap:14px"});

    // Held?
    controls.append(toggleGroup("Meeting held", l.held===true?"yes":l.held===false?"no":null,
      [["Held","yes","yes"],["Not held","no","no"]],
      canEdit, async(val)=>{
        const held = val==="yes";
        await patchWeek(c,w,{held});
        renderStudentAfterReload(studentId);
      }));

    // Student attended? (only meaningful if held)
    controls.append(toggleGroup("Student", l.studentAttended===true?"yes":l.studentAttended===false?"no":null,
      [["Attended","yes","yes"],["Absent","no","no"]],
      canEdit && l.held===true, async(val)=>{
        await patchWeek(c,w,{studentAttended: val==="yes"});
        renderStudentAfterReload(studentId);
      }));

    // Co-supervisor attended? (only if a co exists & held)
    if(c.coUid){
      controls.append(toggleGroup("Co-supervisor",
        l.coAttended==="yes"?"yes":l.coAttended==="no"?"no":l.coAttended==="na"?"na":null,
        [["Attended","yes","yes"],["Absent","no","no"],["N/A","na","na"]],
        canEdit && l.held===true, async(val)=>{
          await patchWeek(c,w,{coAttended: val});
          renderStudentAfterReload(studentId);
        }));
    }
    body.append(controls);

    // Reset — clears this week's record (held / attendance / comment) so the
    // supervisor can fix a mistake. Only shown when there's something to clear.
    if(canEdit && Object.keys(l).length){
      const hasOverride=!!(l.day||l.start||l.end||l.mode||l.link);
      const resetRow=el("div",{class:"row",style:"margin-top:8px"});
      resetRow.append(el("button",{class:"btn ghost xs",onclick:()=>{
        modal("Reset week "+w+"?",
          el("p",{class:"muted",style:"margin:0"},
            "This clears the meeting record for week "+w+" (held status, attendance and comment), so you can record it again."+
            (hasOverride?" The changed time for this week will also be reset to the recurring time.":"")),
          async()=>{
            try{
              // Clearing = overwrite the week with an empty record.
              await DB.updateWeek(c.id, String(w), {});
              if(!c.weeks) c.weeks={};
              c.weeks[String(w)]={};
            }catch(err){
              console.error("week reset failed",err);
              toast("Couldn't reset — "+(err?.code||err?.message||"please try again."),true);
              return false;
            }
            toast("Week "+w+" reset."); renderStudentAfterReload(studentId); return true;
          },"Reset week");
        // tint the confirm button
        const b=document.querySelectorAll(".modal .btn"); b[b.length-1].classList.add("danger");
      }},"↺ Reset week "+w));
      body.append(resetRow);
    }

    // comment — saves automatically (debounced while typing, and on blur)
    if(canEdit){
      const ta=el("textarea",{placeholder:"Comment (optional) — e.g. progress, follow-ups, reason for absence"},l.comment||"");
      const status=el("span",{class:"muted ui",style:"font-size:12.5px;margin-left:8px"},"");
      let lastSaved=l.comment||"";
      let timer=null, saving=false;
      async function commit(){
        const val=ta.value.trim();
        if(val===lastSaved){ return; }      // nothing changed
        if(saving) return;
        saving=true; status.textContent="Saving…";
        try{
          await patchWeek(c,w,{comment:val}); // patchWeek updates the local copy too
          lastSaved=val; status.textContent="Saved";
          setTimeout(()=>{ if(status.textContent==="Saved") status.textContent=""; },1500);
        }catch(e){
          status.textContent="Not saved — check connection";
        }finally{ saving=false; }
      }
      ta.addEventListener("input",()=>{
        status.textContent="Editing…";
        clearTimeout(timer); timer=setTimeout(commit,900); // debounce
      });
      ta.addEventListener("blur",()=>{ clearTimeout(timer); commit(); });
      body.append(el("div",{class:"wcomment"},ta,
        el("div",{style:"margin-top:3px"},status)));
    } else if(l.comment){
      body.append(el("div",{class:"wcomment muted",style:"font-style:italic"},"\u201C"+l.comment+"\u201D"));
    }

    // status pill
    if(l.held===true){
      const sp = l.studentAttended===true ? el("span",{class:"pill held"},"Attended")
               : l.studentAttended===false ? el("span",{class:"pill missed"},"Missed")
               : el("span",{class:"pill none"},"Held");
      meta.prepend(sp);
    } else if(l.held===false){
      meta.prepend(el("span",{class:"pill none"},"Not held"));
    } else {
      meta.prepend(el("span",{class:"pill none"},"No record"));
    }

    return el("div",{class:"wrow"},wk,body);
  }

  // persist a partial update to a single week, merging into that week's data.
  // Writes only the one nested key (weeks.<n>) so Firestore can't drop it.
  async function patchWeek(c,w,partial){
    const key=String(w);
    const prev=(c.weeks?.[key]) || (c.weeks?.[w]) || {};
    const merged={...prev,...partial};
    // strip undefined so Firestore doesn't choke
    Object.keys(merged).forEach(k=>merged[k]===undefined&&delete merged[k]);
    try{
      await DB.updateWeek(c.id, key, merged);
    }catch(err){
      console.error("patchWeek failed",err);
      toast("Couldn't save — "+(err?.code||err?.message||"please try again."),true);
      throw err; // let callers (e.g. the comment saver) know it didn't persist
    }
    if(!c.weeks) c.weeks={};
    c.weeks[key]=merged; // keep local copy fresh
  }

  async function renderStudentAfterReload(studentId){
    cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});
    renderStudent(studentId);
  }

  sel.onchange=()=>renderStudent(sel.value);
  renderStudent(sel.value);
}

function statBox(n,l){ return el("div",{class:"b"},el("div",{class:"n"},n),el("div",{class:"l"},l)); }

// A small yes/no(/na) toggle group
function toggleGroup(label,current,options,enabled,onPick){
  const seg=el("div",{class:"seg3"});
  options.forEach(([txt,val,kind])=>{
    const b=el("button",{class:(current===val?"on "+kind:"")},txt);
    if(enabled) b.onclick=()=>onPick(val); else b.disabled=true;
    seg.append(b);
  });
  return el("div",{},el("div",{class:"muted ui",style:"font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;font-weight:600"},label),seg);
}

// Override a single week's time / link
function weekOverrideForm(c,w,done){
  const cur=(c.weeks?.[w]) || (c.weeks?.[String(w)]) || {};
  const useDefault=el("input",{type:"checkbox",style:"width:auto",...(!(cur.day||cur.start||cur.end||cur.mode||cur.link)?{checked:"checked"}:{})});
  const day=el("select",{},...DAYS.map(d=>el("option",{value:d,...(d===(cur.day||c.day)?{selected:"selected"}:{})},d)));
  const start=el("input",{type:"time",value:cur.start||c.start});
  const end=el("input",{type:"time",value:cur.end||c.end});
  const mode=el("select",{},...["Online","In person","Hybrid"].map(m=>el("option",{value:m,...(m===(cur.mode||c.mode)?{selected:"selected"}:{})},m)));
  const link=el("input",{value:cur.link||"",placeholder:"Leave blank to use the recurring link"});

  modal("Week "+w+" — change time",
    el("div",{class:"grid"},
      el("label",{class:"ui",style:"display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-weight:500;color:var(--ink)"},
        useDefault," Use the recurring time for this week (no change)"),
      el("div",{class:"grid",style:"grid-template-columns:1fr 1fr"},
        el("div",{style:"grid-column:1/-1"},el("label",{},"Day"),day),
        el("div",{},el("label",{},"Start"),start),
        el("div",{},el("label",{},"End"),end),
        el("div",{style:"grid-column:1/-1"},el("label",{},"Mode"),mode),
        el("div",{style:"grid-column:1/-1"},el("label",{},"Meeting link for this week"),link))),
    async()=>{
      const key=String(w);
      const keep=(c.weeks?.[key]) || (c.weeks?.[w]) || {};
      // preserve the logging fields (held / attendance / comment), only change overrides
      const logged={held:keep.held,studentAttended:keep.studentAttended,coAttended:keep.coAttended,comment:keep.comment};
      let weekData;
      if(useDefault.checked){
        weekData={...logged}; // strip overrides — back to recurring time
      } else {
        if(start.value>=end.value){ toast("End must be after start.",true); return false; }
        weekData={...logged, day:day.value,start:start.value,end:end.value,mode:mode.value,link:link.value.trim()};
      }
      // clean undefined keys
      Object.keys(weekData).forEach(k=>weekData[k]===undefined&&delete weekData[k]);
      try{
        await DB.updateWeek(c.id, key, weekData);
      }catch(err){
        console.error("week override save failed",err);
        toast("Couldn't save this week's time — "+(err?.code||err?.message||"please try again."),true);
        return false; // keep the modal open so the entry isn't lost
      }
      if(!c.weeks) c.weeks={};
      c.weeks[key]=weekData; // local copy fresh so re-render shows the new time
      toast("Week "+w+" updated."); done(); return true;
    });
}



/* ============================================================
   9b. MESSAGES  (staff send; students read-only)
   Direct 1-to-1 messages. A staff member (admin, principal or
   co-supervisor) composes to one recipient — any staff member or
   any student. Students never send; they only read messages
   addressed to them (shown in their read-only lookup view).
   Message shape:
     {fromUid, fromName, fromRole,
      toType:'staff'|'student',
      toUid (if staff) | toSid (if student),
      toName, body, ts, readBy:{uid:true}}
   ============================================================ */
async function viewMessages(v){
  v.innerHTML="";
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Direct messages"),
    el("h2",{},"Messages"))));
  v.append(el("p",{class:"muted ui",style:"margin-top:-8px"},
    "Send a direct message to any staff member or student, or a shared note to all your students. In-app only: messages appear inside the app — they are not sent to anyone's email or mobile. Students can read messages addressed to them but cannot reply."));

  // sub-tabs: Inbox / Sent
  let sub = viewMessages._sub || "inbox";
  const subBar=el("div",{class:"seg",style:"max-width:280px;margin:0 0 16px"});
  const mkSub=(id,label)=>el("button",{class:sub===id?"active":"",onclick:()=>{viewMessages._sub=id;viewMessages(v);}},label);
  subBar.append(mkSub("inbox","Inbox"),mkSub("sent","Sent"));
  v.append(el("div",{class:"row",style:"justify-content:space-between;align-items:center"},
    subBar,
    el("div",{class:"row"},
      el("button",{class:"btn blue",onclick:()=>broadcastMessage(()=>viewMessages(v))},"📣 Message all my students"),
      el("button",{class:"btn",onclick:()=>composeMessage(()=>viewMessages(v))},"✎ New message"))));

  const all=await DB.list("messages");
  let rows;
  if(sub==="inbox"){
    rows=all.filter(m=>m.toType==="staff" && m.toUid===S.uid);
  } else {
    rows=all.filter(m=>m.fromUid===S.uid);
  }
  rows.sort((a,b)=>(b.ts||0)-(a.ts||0)); // newest first

  if(!rows.length){
    v.append(emptyState(sub==="inbox"?"No messages yet":"You haven't sent anything",
      sub==="inbox"?"Messages sent to you will appear here.":"Use New message to write to a colleague or student."));
    return;
  }

  // mark inbox messages as read
  if(sub==="inbox"){
    for(const m of rows){
      if(!m.readBy || !m.readBy[S.uid]){
        const readBy={...(m.readBy||{}),[S.uid]:true};
        DB.update("messages",m.id,{readBy}); // fire-and-forget
        m.readBy=readBy;
      }
    }
  }

  const list=el("div",{class:"grid",style:"gap:10px"});
  rows.forEach(m=>{
    const who = sub==="inbox"
      ? "From "+(m.fromName||"—")
      : "To "+(m.toName||"—")+(m.toType==="student"?" (student)":"")+(m.broadcast?" · broadcast":"");
    const unread = sub==="inbox" && false; // already marked read above
    const card=el("div",{class:"card",style:"padding:14px 16px"});
    card.append(
      el("div",{class:"row",style:"justify-content:space-between;align-items:baseline;margin-bottom:6px"},
        el("strong",{class:"ui",style:"font-size:15px"},who),
        el("span",{class:"muted ui",style:"font-size:12.5px"},fmtTs(m.ts))),
      el("div",{style:"white-space:pre-wrap"},m.body||""));
    // sender (or admin) can delete their own message
    if(m.fromUid===S.uid || S.role==="admin"){
      card.append(el("div",{class:"row",style:"justify-content:flex-end;margin-top:8px"},
        el("button",{class:"btn ghost sm",onclick:()=>confirmDelete("messages",m.id,"this message",()=>viewMessages(v))},"Delete")));
    }
    list.append(card);
  });
  v.append(list);
}

function fmtTs(ts){
  if(!ts) return "";
  const d=new Date(ts);
  if(isNaN(d)) return "";
  return d.toLocaleString(undefined,{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
}

async function composeMessage(done, preselect){
  // Build recipient list: all staff (except me) + all students.
  // `preselect` (optional) is a recipient value string, e.g. "staff:<uid>"
  // or "student:<sid>:<docId>", used to open the composer pre-addressed.
  const users=(await DB.listUsers()).filter(u=>u.id!==S.uid);
  const students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});

  const sel=el("select",{});
  sel.append(el("option",{value:"",disabled:"disabled",...(preselect?{}:{selected:"selected"})},"Choose a recipient…"));
  if(users.length){
    const og=el("optgroup",{label:"Staff"});
    users.forEach(u=>og.append(el("option",{value:"staff:"+u.id,...(preselect==="staff:"+u.id?{selected:"selected"}:{})},(u.name||u.email)+" · "+(u.role==="admin"?"Admin":capLabel(capOf(u))))));
    sel.append(og);
  }
  if(students.length){
    const og=el("optgroup",{label:"Students"});
    // de-dupe students by sid (a student may recur across semesters)
    const seen=new Set();
    students.forEach(s=>{ if(seen.has(s.sid))return; seen.add(s.sid);
      const val="student:"+s.sid+":"+s.id;
      og.append(el("option",{value:val,...(preselect===val||(preselect&&preselect.startsWith("student:"+s.sid+":")?{selected:"selected"}:{}))},s.name+" · "+s.sid)); });
    sel.append(og);
  }
  const body=el("textarea",{placeholder:"Write your message…",style:"min-height:120px"});

  modal("New message",
    el("div",{class:"grid"},
      el("div",{},el("label",{},"To"),sel),
      el("div",{},el("label",{},"Message"),body),
      el("p",{class:"muted",style:"margin:0"},"In-app only: the recipient sees this inside the app (students in their schedule view) — it is not sent to their email or mobile. Students can't reply.")),
    async()=>{
      if(!sel.value){ toast("Choose a recipient.",true); return false; }
      if(!body.value.trim()){ toast("Write a message first.",true); return false; }
      const parts=sel.value.split(":");
      const data={fromUid:S.uid,fromName:S.userName||S.user.email,fromRole:S.role,
        body:body.value.trim(),ts:Date.now(),readBy:{}};
      if(parts[0]==="staff"){
        const u=users.find(x=>x.id===parts[1]);
        data.toType="staff"; data.toUid=parts[1]; data.toName=u?.name||u?.email||"";
      } else {
        const s=students.find(x=>x.id===parts[2]);
        data.toType="student"; data.toSid=parts[1]; data.toName=s?.name||"";
      }
      await DB.add("messages",data);
      toast("Message sent."); done(); return true;
    },"Send");
}

// Broadcast: send the SAME message to every student a supervisor supervises
// (as principal or co), or — for admin — to every student in the active
// semester. One student-addressed message row is created per recipient, so it
// lands in each student's read-only view. Nothing is emailed or texted.
async function broadcastMessage(done){
  const allStudents=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  let recipients=allStudents;
  if(S.role==="supervisor"){
    recipients=allStudents.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  }
  // de-dupe by student ID (sid) so a student enrolled twice gets one copy
  const seen=new Set(); recipients=recipients.filter(s=>{ if(seen.has(s.sid))return false; seen.add(s.sid); return true; });

  if(!recipients.length){
    toast(S.role==="supervisor"?"You have no students in this semester.":"No students in this semester.",true);
    return;
  }

  const body=el("textarea",{placeholder:"Shared message to all your students — e.g. a reading, a deadline reminder, a room change…",style:"min-height:130px"});
  const scopeNote = S.role==="supervisor"
    ? `This goes to all ${recipients.length} student${recipients.length===1?"":"s"} you supervise (principal or co) this semester.`
    : `This goes to all ${recipients.length} student${recipients.length===1?"":"s"} in this semester.`;

  modal("Message all my students",
    el("div",{class:"grid"},
      el("div",{},el("label",{},"Recipients"),
        el("p",{class:"muted",style:"margin:2px 0 0"},scopeNote)),
      el("div",{},el("label",{},"Message"),body),
      el("p",{class:"muted",style:"margin:0"},
        "In-app only: students see this in their schedule view when they next open the app. It is NOT sent to their email or mobile, and students cannot reply.")),
    async()=>{
      const text=body.value.trim();
      if(!text){ toast("Write a message first.",true); return false; }
      const fromName=S.userName||S.user.email;
      // Write each recipient as a separate student-addressed message.
      for(const s of recipients){
        await DB.add("messages",{
          fromUid:S.uid, fromName, fromRole:S.role,
          toType:"student", toSid:s.sid, toName:s.name||"",
          body:text, ts:Date.now(), readBy:{}, broadcast:true
        });
      }
      toast(`Sent to ${recipients.length} student${recipients.length===1?"":"s"}.`); done(); return true;
    },"Send to all");
}

/* ============================================================
   9b. BULK EMAIL TO STUDENTS (supervisor)
   Opens the supervisor's own mail app (via mailto:) with their
   students' addresses pre-loaded into BCC, plus a subject/body the
   supervisor can edit. Scope can be narrowed to just the students
   they are principal supervisor for, just the ones they co-supervise,
   or everyone. BCC keeps each student's address private from the
   others. Nothing is sent from the app itself — the supervisor taps
   "send" in their mail client.
   ============================================================ */
async function bulkEmailStudents(){
  if(S.role!=="supervisor"){ toast("Bulk email is for supervisors.",true); return; }
  const all=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  const mine=all.filter(s=>s.principalUid===S.uid||s.coUid===S.uid);
  if(!mine.length){ toast("You have no students in this semester.",true); return; }

  const principalCount=mine.filter(s=>s.principalUid===S.uid).length;
  const coCount=mine.filter(s=>s.coUid===S.uid && s.principalUid!==S.uid).length;

  // scope picker
  const scope=el("select",{},
    el("option",{value:"all"},`All my students (${mine.length})`),
    el("option",{value:"principal"},`Students I am principal supervisor for (${principalCount})`),
    el("option",{value:"co"},`Students I co-supervise (${coCount})`));
  const subject=el("input",{value:"MRes supervision — "+(activeSemester()?.label||"this semester")});
  const body=el("textarea",{placeholder:"Dear all,\n\nA quick note for everyone I supervise this semester…",style:"min-height:120px"});
  const note=el("p",{class:"muted",style:"margin:0"});
  const preview=el("p",{class:"muted",style:"margin:2px 0 0;font-size:13px"});

  function selected(){
    const m=scope.value;
    let list = m==="principal" ? mine.filter(s=>s.principalUid===S.uid)
             : m==="co"        ? mine.filter(s=>s.coUid===S.uid && s.principalUid!==S.uid)
             :                   mine;
    // unique by sid, only those with an email on file
    const seen=new Set();
    return list.filter(s=>{ if(!s.email) return false; if(seen.has(s.sid)) return false; seen.add(s.sid); return true; });
  }
  function refresh(){
    const recips=selected();
    const noEmail=( scope.value==="principal" ? mine.filter(s=>s.principalUid===S.uid)
                  : scope.value==="co"        ? mine.filter(s=>s.coUid===S.uid && s.principalUid!==S.uid)
                  :                             mine ).filter(s=>!s.email).length;
    note.textContent = recips.length
      ? `${recips.length} recipient${recips.length===1?"":"s"} will be added to BCC (each address hidden from the others).`
      : "No students with an email on file in this group.";
    preview.textContent = recips.length
      ? "To: "+recips.map(s=>s.name||s.email).slice(0,6).join(", ")+(recips.length>6?` +${recips.length-6} more`:"")
        + (noEmail?`  ·  ${noEmail} skipped (no email).`:"")
      : "";
  }
  scope.onchange=refresh; refresh();

  modal("Email all my students",
    el("div",{class:"grid"},
      el("div",{},el("label",{},"Who to email"),scope),
      el("div",{},el("label",{},"Subject"),subject),
      el("div",{},el("label",{},"Message"),body),
      note, preview,
      el("p",{class:"muted",style:"margin:0"},
        "This opens your device's mail app with the addresses in BCC and the text pre-filled. Review and tap send there — the hub does not send email itself.")),
    async()=>{
      const recips=selected();
      if(!recips.length){ toast("No students with an email to send to.",true); return false; }
      const emails=recips.map(s=>s.email);
      // mailto with BCC; put the supervisor's own address (if known) as the visible "to"
      const me=S.supervisors.find(u=>u.id===S.uid);
      const to=me?.email||"";
      const url="mailto:"+encodeURIComponent(to)
        +"?bcc="+encodeURIComponent(emails.join(","))
        +"&subject="+encodeURIComponent(subject.value||"")
        +"&body="+encodeURIComponent(body.value||"");
      window.location.href=url;
      toast(`Opening mail app with ${recips.length} recipient${recips.length===1?"":"s"} in BCC.`);
      return true;
    },"Open mail app");
}

/* ============================================================
   10. SUMMARY REPORT (admin) — oversight + CSV
   Shows, per principal supervisor and per student, whether the
   consultation is arranged, how many meetings held, and attendance.
   ============================================================ */
async function viewReport(v){
  v.innerHTML="";
  const sem=activeSemester();
  const weeks=sem?.weeks||12;
  v.append(el("div",{class:"section-title"},el("div",{},
    el("div",{class:"eyebrow ui"},"Oversight · "+(sem?.label||""),),
    el("h2",{},"Supervision summary"))));

  // ---- Toolbar: semester + supervisor focus + role lens ----
  // viewReport keeps its own filter state so it survives re-renders.
  viewReport._sup = viewReport._sup || "all";        // supervisor uid or "all"
  viewReport._lens = viewReport._lens || "any";       // "any" | "principal" | "co"

  const students=await DB.list("students", S.activeSem?{semesterId:S.activeSem}:{});
  const cons=await DB.list("consultations", S.activeSem?{semesterId:S.activeSem}:{});

  // Supervisor focus dropdown (built from staff who actually supervise here,
  // plus any supervisor on the roster so admin can pick anyone).
  const supSel=el("select",{style:"width:auto;min-width:200px",onchange:e=>{viewReport._sup=e.target.value;viewReport(v);}});
  supSel.append(el("option",{value:"all",...(viewReport._sup==="all"?{selected:"selected"}:{})},"All supervisors"));
  // collect unique supervisors referenced on students + the global supervisor list
  const supMap=new Map();
  S.supervisors.forEach(u=>supMap.set(u.id,u.name||u.email||u.id));
  students.forEach(s=>{ if(s.principalUid)supMap.set(s.principalUid,s.principalName||supMap.get(s.principalUid)||s.principalUid);
                        if(s.coUid)supMap.set(s.coUid,s.coName||supMap.get(s.coUid)||s.coUid); });
  [...supMap.entries()].sort((a,b)=>String(a[1]).localeCompare(String(b[1]))).forEach(([uid,name])=>{
    supSel.append(el("option",{value:uid,...(viewReport._sup===uid?{selected:"selected"}:{})},name));
  });

  const lensSel=el("select",{style:"width:auto;min-width:150px",onchange:e=>{viewReport._lens=e.target.value;viewReport(v);}});
  [["any","As principal or co"],["principal","As principal only"],["co","As co-supervisor only"]].forEach(([val,lab])=>
    lensSel.append(el("option",{value:val,...(viewReport._lens===val?{selected:"selected"}:{})},lab)));

  const bar=el("div",{class:"toolbar"});
  bar.append(semesterPicker(()=>viewReport(v)));
  bar.append(el("div",{class:"field"},el("label",{},"Supervisor focus"),supSel));
  bar.append(el("div",{class:"field"},el("label",{},"Role lens"),
    (viewReport._sup==="all"
      ? el("select",{style:"width:auto;min-width:150px",disabled:"disabled"},el("option",{},"—"))
      : lensSel)));
  v.append(bar);

  if(!students.length){ v.append(emptyState("Nothing to report yet","Add students and meetings first.")); return; }

  // ---- Build the per-student rows for the CURRENT lens ----
  // When a supervisor is focused, a student is included if that supervisor is
  // their principal and/or co (depending on the lens). We also tag which role
  // the focused supervisor plays for that student so the detail view is clear.
  const focus=viewReport._sup;
  const lens=viewReport._lens;
  function matches(s){
    if(focus==="all") return true;
    const isP=s.principalUid===focus, isC=s.coUid===focus;
    if(lens==="principal") return isP;
    if(lens==="co") return isC;
    return isP||isC; // any
  }
  const rows=students.filter(matches).map(s=>{
    // the consultation record always belongs to the principal supervisor
    const c=cons.find(x=>x.studentDocId===s.id && x.supervisorUid===s.principalUid);
    const st=c?consultStats(c,weeks):{held:0,attended:0,missed:0,logged:0};
    const focusRole = focus==="all" ? "" : (s.principalUid===focus?"Principal":(s.coUid===focus?"Co-supervisor":""));
    return {s,c,st,arranged:!!c,focusRole};
  });

  // ---- Headline stats (reflect the current filter) ----
  const arranged=rows.filter(r=>r.arranged).length;
  const noTime=rows.length-arranged;
  const totalHeld=rows.reduce((a,r)=>a+r.st.held,0);
  const totalAttended=rows.reduce((a,r)=>a+r.st.attended,0);
  const totalMissed=rows.reduce((a,r)=>a+r.st.missed,0);

  const focusName = focus==="all" ? null : supMap.get(focus);
  if(focusName){
    v.append(el("p",{class:"muted ui",style:"margin:-4px 0 12px"},
      "Showing "+rows.length+" student"+(rows.length===1?"":"s")+" supervised by "+focusName+
      (lens==="any"?" (as principal or co)":lens==="principal"?" as principal":" as co-supervisor")+"."));
  }

  v.append(el("div",{class:"stat"},
    statBox(String(rows.length),"Students"),
    statBox(String(arranged),"Consultation set"),
    statBox(String(noTime),"No time set"),
    statBox(String(totalHeld),"Meetings held"),
    statBox(String(totalMissed),"Missed"),
    statBox(totalHeld?Math.round(totalAttended/totalHeld*100)+"%":"—","Attendance rate")));

  // ---- Action row: exports + (when focused) contact the supervisor ----
  const actions=el("div",{class:"row",style:"margin-bottom:14px"});
  actions.append(
    el("button",{class:"btn",onclick:()=>downloadReportCSV(rows,sem,weeks)},"Download summary CSV"),
    el("button",{class:"btn blue",onclick:()=>downloadDetailedLogCSV(rows,sem,weeks,focusName,lens)},"Download detailed week-by-week logs"),
    el("button",{class:"btn ghost",onclick:()=>window.print()},"Print / PDF"));
  if(focus!=="all"){
    const focusUser=S.supervisors.find(u=>u.id===focus);
    actions.append(el("button",{class:"btn amber",onclick:()=>composeMessage(()=>toast("Sent."),"staff:"+focus)},
      "✉ Message "+(focusName||"this supervisor")));
    // detailed log extraction for this one supervisor (on-screen, all weeks)
    actions.append(el("button",{class:"btn ghost",onclick:()=>showSupervisorDetail(focus,focusName,lens,rows,sem,weeks)},
      "View full log for "+(focusName||"supervisor")));
  }
  v.append(actions);

  // ---- Grouping: by principal when unfocused; flat list when focused ----
  if(focus==="all"){
    const byPrin={};
    rows.forEach(r=>{ const k=r.s.principalName||"Unassigned"; (byPrin[k] ||= []).push(r); });
    Object.keys(byPrin).sort().forEach(prin=>{
      const grp=byPrin[prin];
      const prinUid=grp[0]?.s.principalUid;
      const card=el("div",{class:"card",style:"margin-bottom:14px;padding:0;overflow:hidden"});
      const headRow=el("div",{style:"padding:11px 16px;background:#0000000a;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px"},
        el("strong",{class:"ui"},"Principal: "+prin),
        el("div",{class:"row"},
          el("span",{class:"muted ui"},grp.length+" student"+(grp.length>1?"s":"")),
          ...(prinUid&&prinUid!==S.uid?[el("button",{class:"btn xs ghost",onclick:()=>composeMessage(()=>toast("Sent."),"staff:"+prinUid)},"✉ Message")]:[]),
          el("button",{class:"btn xs ghost",onclick:()=>{viewReport._sup=prinUid;viewReport._lens="principal";viewReport(v);}},"Focus →")));
      card.append(headRow);
      card.append(buildReportTable(grp,weeks,false,v));
      v.append(card);
    });
  } else {
    const card=el("div",{class:"card",style:"margin-bottom:14px;padding:0;overflow:hidden"});
    card.append(el("div",{style:"padding:11px 16px;background:#0000000a;border-bottom:1px solid var(--line);display:flex;justify-content:space-between"},
      el("strong",{class:"ui"},focusName||"Supervisor"),
      el("span",{class:"muted ui"},rows.length+" student"+(rows.length===1?"":"s"))));
    if(!rows.length){
      card.append(el("p",{class:"muted",style:"padding:20px;margin:0"},"No students match this supervisor and role lens."));
    } else {
      card.append(buildReportTable(rows,weeks,true,v));
    }
    v.append(card);
  }
}

// Shared table builder. showRole adds a "Role" column (which hat the focused
// supervisor wears for that student); every row gets a "Contact" cell with
// quick message buttons to the student and the co-supervisor.
function buildReportTable(group,weeks,showRole,v){
  const headers=["Student","Campus",...(showRole?["Role"]:[]),"Co-supervisor","Time arranged","Held","Attended","Missed","Co present","Last comment","Contact"];
  const t=el("table",{});
  t.append(el("thead",{},el("tr",{},...headers.map(h=>el("th",{},h)))));
  const tb=el("tbody",{});
  group.forEach(({s,c,st,focusRole})=>{
    let coYes=0,coNo=0;
    if(c) for(let w=1;w<=weeks;w++){ const l=weekLog(c,w); if(l?.coAttended==="yes")coYes++; else if(l?.coAttended==="no")coNo++; }
    let lastComment="";
    if(c) for(let w=weeks;w>=1;w--){ const cm=weekLog(c,w)?.comment; if(cm){ lastComment="W"+w+": "+cm; break; } }

    // contact buttons: in-app message + email handoff for the student;
    // in-app message for co/principal (their email lives in the Contacts tab)
    const contact=el("div",{class:"row",style:"gap:5px"});
    contact.append(el("button",{class:"btn xs blue",title:"Message "+s.name,
      onclick:()=>composeMessage(()=>toast("Sent."),"student:"+s.sid+":"+s.id)},"✉ Msg"));
    contact.append(emailButton(s.email,"MRes supervision — "+s.name,"Dear "+(s.name||"")+",\n\n","✉ Email","btn xs ghost"));
    if(s.coUid && s.coUid!==S.uid){
      contact.append(el("button",{class:"btn xs ghost",title:"Message "+(s.coName||"co-supervisor"),
        onclick:()=>composeMessage(()=>toast("Sent."),"staff:"+s.coUid)},"Co"));
    }
    if(s.principalUid && s.principalUid!==S.uid){
      contact.append(el("button",{class:"btn xs ghost",title:"Message "+(s.principalName||"principal"),
        onclick:()=>composeMessage(()=>toast("Sent."),"staff:"+s.principalUid)},"Principal"));
    }

    const cells=[
      el("td",{},el("strong",{},s.name),el("div",{class:"muted ui",style:"font-size:12px"},s.sid||"")),
      el("td",{},s.campus),
      ...(showRole?[el("td",{}, focusRole?el("span",{class:"pill blue"},focusRole):el("span",{class:"muted"},"—"))]:[]),
      el("td",{},s.coName||"—"),
      el("td",{}, c?el("span",{class:"pill held"},`${c.day} ${c.start}`):el("span",{class:"pill missed"},"Not set")),
      el("td",{},String(st.held)),
      el("td",{},String(st.attended)),
      el("td",{},String(st.missed)),
      el("td",{}, c?.coUid?`${coYes}/${coYes+coNo}`:el("span",{class:"muted"},"—")),
      el("td",{class:"muted",style:"max-width:200px;white-space:normal"},lastComment||"—"),
      el("td",{},contact)
    ];
    tb.append(el("tr",{},...cells));
  });
  t.append(tb);
  return t;
}

// On-screen detailed week-by-week log for one focused supervisor, in a modal.
function showSupervisorDetail(supUid,supName,lens,rows,sem,weeks){
  const wrap=el("div",{class:"grid",style:"gap:14px"});
  if(!rows.length){
    wrap.append(el("p",{class:"muted",style:"margin:0"},"No students for this supervisor under the current role lens."));
  }
  rows.forEach(({s,c,focusRole})=>{
    const block=el("div",{style:"border:1px solid var(--line);border-radius:8px;overflow:hidden"});
    block.append(el("div",{style:"padding:9px 13px;background:#0000000a;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline;gap:8px"},
      el("strong",{class:"ui"},s.name+(focusRole?" · "+focusRole:"")),
      el("span",{class:"muted ui",style:"font-size:12.5px"},s.campus+(c?` · ${c.day} ${c.start}–${c.end}`:" · no time set"))));
    if(!c){
      block.append(el("p",{class:"muted",style:"padding:10px 13px;margin:0"},"No consultation arranged — nothing logged."));
    } else {
      const t=el("table",{style:"font-size:14px"});
      t.append(el("thead",{},el("tr",{},...["Wk","Held","Student","Co","Time","Comment"].map(h=>el("th",{},h)))));
      const tb=el("tbody",{});
      let any=false;
      for(let w=1;w<=weeks;w++){
        const l=weekLog(c,w); if(!Object.keys(l).length) continue; any=true;
        const et=weekTime(c,w);
        tb.append(el("tr",{},
          el("td",{},"W"+w),
          el("td",{}, l.held===true?el("span",{class:"pill held"},"Held"):l.held===false?el("span",{class:"pill missed"},"Not held"):el("span",{class:"muted"},"—")),
          el("td",{}, l.studentAttended===true?"✓":l.studentAttended===false?"✗":"—"),
          el("td",{}, l.coAttended==="yes"?"✓":l.coAttended==="no"?"✗":l.coAttended==="na"?"n/a":"—"),
          el("td",{class:"muted ui",style:"font-size:12.5px"},`${et.day||""} ${et.start||""}${et.overridden?" *":""}`),
          el("td",{class:"muted",style:"white-space:normal;max-width:240px"},l.comment||"")));
      }
      if(!any) tb.append(el("tr",{},el("td",{colspan:"6",class:"muted"},"No weeks recorded yet.")));
      t.append(tb); block.append(t);
    }
    wrap.append(block);
  });

  modal((supName||"Supervisor")+" — full supervision log",wrap,async()=>{
    downloadDetailedLogCSV(rows,sem,weeks,supName,lens); return true;
  },"Download CSV");
  // make the modal wide for the table
  document.querySelector(".modal")?.classList.add("wide");
}
function downloadReportCSV(rows,sem,weeks){
  const head=["student","sid","campus","principal","co_supervisor","time_arranged","recurring_time","meetings_held","student_attended","student_missed","co_present","attendance_rate"];
  const lines=[head.join(",")];
  rows.forEach(({s,c,st})=>{
    let coYes=0,coTot=0;
    if(c) for(let w=1;w<=weeks;w++){ const l=weekLog(c,w); if(l?.coAttended==="yes"){coYes++;coTot++;} else if(l?.coAttended==="no")coTot++; }
    const rate=st.held?Math.round(st.attended/st.held*100)+"%":"";
    const cell=[
      s.name,s.sid,s.campus,s.principalName||"",s.coName||"",
      c?"yes":"no", c?`${c.day} ${c.start}-${c.end}`:"",
      st.held,st.attended,st.missed, c?.coUid?`${coYes}/${coTot}`:"", rate
    ];
    lines.push(cell.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const fname=`supervision_report_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("Report downloaded.");
}

// Detailed extraction: one CSV row per logged week, across the given rows.
// Used for "Download detailed week-by-week logs" and the supervisor modal.
function downloadDetailedLogCSV(rows,sem,weeks,focusName,lens){
  const head=["student","sid","campus","principal","co_supervisor","week",
    "day","start","end","mode","time_overridden",
    "meeting_held","student_attended","co_attended","comment"];
  const lines=[head.join(",")];
  rows.forEach(({s,c})=>{
    if(!c) return;
    for(let w=1;w<=weeks;w++){
      const l=weekLog(c,w); if(!Object.keys(l).length) continue;
      const et=weekTime(c,w);
      const cell=[
        s.name,s.sid,s.campus,s.principalName||"",s.coName||"",
        "W"+w, et.day||"",et.start||"",et.end||"",et.mode||"", et.overridden?"yes":"no",
        l.held===true?"held":l.held===false?"not_held":"",
        l.studentAttended===true?"yes":l.studentAttended===false?"no":"",
        l.coAttended||"",
        (l.comment||"")
      ];
      lines.push(cell.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(","));
    }
  });
  if(lines.length===1) lines.push('"No logged weeks for this selection"');
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const tag=focusName?("_"+focusName.replace(/\s+/g,"_")+(lens&&lens!=="any"?"_"+lens:"")):"";
  const fname=`supervision_detailed${tag}_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("Detailed logs downloaded.");
}

function downloadTimetableCSV(rows,sem){
  const head=["unit","unit_name","semester","supervisor","day","start","end","room"];

  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const fname=`timetable_${(sem?.label||"export").replace(/\s+/g,"_")}.csv`;
  const a=el("a",{href:URL.createObjectURL(blob),download:fname});
  document.body.append(a); a.click(); a.remove(); toast("CSV downloaded.");
}

/* ============================================================
   11b. EMAIL HANDOFF + CONTACTS (admin)
   The app can't send email itself from a static page, so it opens
   the device's own mail app pre-filled via a mailto: link. The user
   taps send. Mobile numbers are stored as a contact record (no SMS
   sending without a backend gateway).
   ============================================================ */
function openEmail(to,subject,body){
  if(!to){ toast("No email on file for this person.",true); return; }
  const url="mailto:"+encodeURIComponent(to)+
    "?subject="+encodeURIComponent(subject||"")+
    "&body="+encodeURIComponent(body||"");
  // location assignment triggers the OS mail handler on web & mobile
  window.location.href=url;
}
// Small reusable "Email" button that opens the mail app.
function emailButton(to,subject,body,label="✉ Email",cls="btn xs ghost"){
  return el("button",{class:cls,title:to?("Email "+to):"No email on file",...(to?{}:{disabled:"disabled"}),
    onclick:()=>openEmail(to,subject,body)},label);
}

      stb.append(el("tr",{},

        el("td",{class:"muted"},u.email||"—"),
        el("td",{class:"muted"},u.mobile||el("span",{class:"muted"},"—")),

      cCard.append(el("p",{class:"muted",style:"padding:18px;margin:0"},"No students in this semester."));
    } else {

      ct.append(el("thead",{},el("tr",{},...["Name","ID","Campus","Email","Mobile","Principal / Co","Contact"].map(h=>el("th",{},h)))));
      const ctb=el("tbody",{});
      students.filter(match).forEach(s=>{
        const contact=el("div",{class:"row",style:"gap:5px"});
        contact.append(emailButton(s.email,"MRes supervision — "+s.name,"Dear "+(s.name||"")+",\n\n"));
        contact.append(el("button",{class:"btn xs ghost",onclick:()=>studentForm(s,()=>{viewContacts(v);})},"Edit"));
        ctb.append(el("tr",{},
          el("td",{},el("strong",{},s.name)),
          el("td",{class:"muted"},s.sid||"—"),
          el("td",{},s.campus||"—"),
          el("td",{class:"muted"},s.email||"—"),
          el("td",{class:"muted"},s.mobile||el("span",{class:"muted"},"—")),
          el("td",{class:"muted ui",style:"font-size:13px"},(s.principalName||"—")+(s.coName?" / "+s.coName:"")),
          el("td",{},contact)));

      ct.append(ctb); cCard.append(ct); host.append(cCard);

  search.addEventListener("input",draw);
  draw();
}
